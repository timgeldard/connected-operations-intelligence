name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-contracts:
    name: Validate Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate Contract Manifest
        run: python3 scripts/contracts/validate_contracts.py

      - name: Generate Contract Files
        run: python3 scripts/contracts/generate_contracts.py

      - name: Check for Uncommitted Contract Changes
        run: |
          if ! git diff --exit-code packages/data-contracts; then
            echo "::error::Generated contracts are out of sync with the manifest. Please run 'make contracts' locally and commit the changes."
            exit 1
          fi

  python-checks:
    name: Python Checks (Non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r data-products/io-reporting/tests/requirements-test.txt pyyaml

      - name: Lint with Ruff
        run: ruff check .

      - name: Check Data Dictionary
        working-directory: data-products/io-reporting
        run: python generate_data_dictionary.py --check

      - name: Run Pytest
        working-directory: data-products/io-reporting
        run: pytest

  frontend-checks:
    name: Frontend Checks (Non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Lint
        run: pnpm lint

      - name: Run Typecheck
        run: pnpm typecheck

      - name: Run Tests
        run: pnpm test

  boundary-check:
    name: Boundary Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pytest
        run: pip install pytest

      - name: Test Boundary Scanner
        run: python -m pytest scripts/ci/test_check_forbidden_data_access.py -q

      - name: Run Boundary Check
        run: python3 scripts/ci/check_forbidden_data_access.py

  validate-bundle:
    name: Validate Databricks Bundle
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      BUNDLE_VAR_notification_email: ci-validation@kerry.com
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Check Databricks credentials
        id: creds
        run: |
          if [ -n "$DATABRICKS_HOST" ] && [ -n "$DATABRICKS_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Bundle validation skipped::DATABRICKS_HOST/DATABRICKS_TOKEN secrets are not set; skipping databricks bundle validate. Configure them in Settings → Secrets → Actions to enable validation."
          fi

      - name: Validate dev_uat_source bundle
        if: steps.creds.outputs.configured == 'true'
        working-directory: data-products/io-reporting
        run: databricks bundle validate -t dev_uat_source

      - name: Validate dev_sample bundle
        if: steps.creds.outputs.configured == 'true'
        working-directory: data-products/io-reporting
        run: databricks bundle validate -t dev_sample

      - name: Validate uat bundle
        if: steps.creds.outputs.configured == 'true'
        working-directory: data-products/io-reporting
        run: databricks bundle validate -t uat

      - name: Validate prod bundle
        if: steps.creds.outputs.configured == 'true'
        working-directory: data-products/io-reporting
        run: databricks bundle validate -t prod
