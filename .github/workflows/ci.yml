name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pytest pyspark ruff

      - name: Lint
        run: ruff check silver/ tests/

      - name: Test
        run: pytest

  validate-bundle:
    runs-on: ubuntu-latest
    # Requires DATABRICKS_HOST and DATABRICKS_TOKEN repository secrets.
    # Set these in: Settings → Secrets → Actions → New repository secret.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Validate dev bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate -t dev
