name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-contracts:
    name: Validate Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate Contract Manifest
        run: python3 scripts/contracts/validate_contracts.py

      - name: Generate Contract Files
        run: python3 scripts/contracts/generate_contracts.py

      - name: Check for Uncommitted Contract Changes
        run: |
          if ! git diff --exit-code packages/data-contracts; then
            echo "::error::Generated contracts are out of sync with the manifest. Please run 'make contracts' locally and commit the changes."
            exit 1
          fi

  python-checks:
    name: Python Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r data-products/io-reporting/tests/requirements-test.txt pyyaml

      - name: Lint with Ruff
        run: ruff check .

      - name: Check Data Dictionary
        working-directory: data-products/io-reporting
        run: python generate_data_dictionary.py --check

      - name: Run Pytest
        working-directory: data-products/io-reporting
        run: pytest

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Lint
        run: pnpm lint

      - name: Run Typecheck
        run: pnpm typecheck

      - name: Run Tests
        run: pnpm test

  boundary-check:
    name: Boundary Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pytest
        run: pip install pytest

      - name: Test Boundary Scanner
        run: python -m pytest scripts/ci/test_check_forbidden_data_access.py -q

      - name: Run Boundary Check
        run: python3 scripts/ci/check_forbidden_data_access.py

  contract-coverage:
    name: Contract Coverage Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml fastapi httpx

      - name: Run Contract Coverage Check
        run: python3 scripts/ci/check_contract_coverage.py

  warehouse360-static-migration-check:
    name: Warehouse360 Static Migration Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Run Warehouse360 static migration check tests
        run: python3 -m pytest scripts/ci/test_check_warehouse360_migration_static.py -q

      - name: Run Warehouse360 validation SQL generator tests
        run: PYTHONPATH=scripts/contracts python3 -m pytest scripts/contracts/test_generate_warehouse360_validation_sql.py -q

      - name: Run Warehouse360 validation SQL drift check
        run: python3 scripts/contracts/generate_warehouse360_validation_sql.py --check

      - name: Run DLT duplicate dataset name tests
        run: python3 -m pytest scripts/ci/test_check_dlt_dataset_names_unique.py -q

      - name: Run DLT duplicate dataset name check
        run: python3 scripts/ci/check_dlt_dataset_names_unique.py

      - name: Run Gold serving SQL ownership tests
        run: python3 -m pytest scripts/ci/test_check_gold_serving_sql_ownership.py -q

      - name: Run Gold serving SQL ownership check
        run: python3 scripts/ci/check_gold_serving_sql_ownership.py

      - name: Run Gold grants policy guard tests
        run: PYTHONPATH=scripts/ci python3 -m pytest scripts/ci/test_check_gold_grants_policy.py -q

      - name: Run Gold grants policy guard
        run: python3 scripts/ci/check_gold_grants_policy.py

      - name: Run documentation check tests
        run: PYTHONPATH=scripts/ci python3 -m pytest scripts/ci/test_check_required_docs.py -q

      - name: Run documentation check
        run: python3 scripts/ci/check_required_docs.py

      - name: Run Warehouse360 static migration check
        run: python3 scripts/ci/check_warehouse360_migration_static.py

      - name: Run Warehouse360 adapter contract-column check
        run: python3 scripts/ci/check_warehouse360_adapter_contract_columns.py

      - name: Run Warehouse360 consumption-view column tests
        run: PYTHONPATH=scripts/ci python3 -m pytest scripts/ci/test_check_warehouse360_consumption_columns.py -q

      - name: Run Warehouse360 consumption-view column guard
        run: python3 scripts/ci/check_warehouse360_consumption_columns.py

      - name: Run security-mode policy guard tests
        run: PYTHONPATH=scripts/ci python3 -m pytest scripts/ci/test_check_security_mode_policy.py -q

      - name: Run security-mode policy guard
        run: python3 scripts/ci/check_security_mode_policy.py

      - name: Run base-MV determinism guard tests
        run: PYTHONPATH=scripts/ci python3 -m pytest scripts/ci/test_check_gold_mv_determinism.py -q

      - name: Run base-MV determinism guard
        run: python3 scripts/ci/check_gold_mv_determinism.py

      - name: Run app migration registry guard
        run: python3 scripts/ci/check_app_migration_registry_guard.py

  single-contract-manifest-guards:
    name: Single-Manifest Contract Guards
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml

      - name: Guard — no tracked copy in apps/api/contracts/
        run: python3 scripts/ci/check_no_tracked_app_manifest.py

      - name: Guard — all adapter contract IDs present in data-products manifest
        run: python3 scripts/ci/check_app_adapter_contract_ids.py

  okf-bundle-freshness:
    name: OKF Bundle Freshness Guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Run OKF bundle conformance tests
        working-directory: data-products/io-reporting
        run: python -m pytest tests/test_okf_bundle.py -v --noconftest

      - name: Check OKF bundle is fresh (drift guard)
        run: python3 scripts/ci/check_okf_bundle_fresh.py

  silver-fast-mapping-check:
    name: Silver Fast Approved-Mapping Guard
    runs-on: ubuntu-latest
    permissions:
      contents: read   # least-privilege: read-only static guard, no write to repo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false   # guard job does not push; do not leave the token on disk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Run silver_fast approved-mapping guard
        run: python3 scripts/ci/check_silver_fast_field_mappings.py

  silver-stage-gate-coverage:
    name: Silver Stage-Gate Coverage Guard
    runs-on: ubuntu-latest
    permissions:
      contents: read   # least-privilege: read-only static guard, no write to repo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false   # guard job does not push; do not leave the token on disk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run silver stage-gate coverage guard
        run: python3 scripts/ci/check_silver_stage_gate_coverage.py
  plant-seed-guard:
    name: Plant Seed Guard
    runs-on: ubuntu-latest
    permissions:
      contents: read   # least-privilege: read-only static guard, no write to repo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pytest
        run: pip install pytest

      - name: Run plant seed guard tests
        run: python3 -m pytest scripts/ci/test_check_site_config_plant_seed.py -q

      - name: Run plant seed guard
        run: python3 scripts/ci/check_site_config_plant_seed.py

  route-response-model-guard:
    name: Route Response-Model Guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pytest
        run: pip install pytest

      - name: Run route response-model guard unit tests
        run: PYTHONPATH=scripts/ci python3 -m pytest scripts/ci/test_check_route_response_models.py -q

      - name: Run route response-model guard
        run: python3 scripts/ci/check_route_response_models.py

  validate-bundle:
    name: Validate Databricks Bundle
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      BUNDLE_VAR_notification_email: ci-validation@kerry.com
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Check Databricks credentials
        id: creds
        run: |
          if [ -n "$DATABRICKS_HOST" ] && [ -n "$DATABRICKS_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ]; then
            # Forked PRs cannot access repo secrets — skip rather than fail (out of the contributor's control).
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Bundle validation skipped (fork)::Secrets are unavailable to forked PRs; skipping databricks bundle validate."
          else
            # Protected branch / same-repo PR with no secrets configured: fail rather than silently skip.
            echo "::error title=Bundle validation cannot run::DATABRICKS_HOST/DATABRICKS_TOKEN secrets are not set on this repository. Configure them in Settings → Secrets → Actions to enable bundle validation."
            exit 1
          fi

      - name: Validate dev_uat_source bundle
        if: steps.creds.outputs.configured == 'true'
        working-directory: data-products/io-reporting
        run: databricks bundle validate -t dev_uat_source

      - name: Validate dev_sample bundle
        if: steps.creds.outputs.configured == 'true'
        working-directory: data-products/io-reporting
        run: databricks bundle validate -t dev_sample

      - name: Validate uat bundle
        if: steps.creds.outputs.configured == 'true'
        working-directory: data-products/io-reporting
        run: databricks bundle validate -t uat

      - name: Validate prod bundle
        if: steps.creds.outputs.configured == 'true'
        working-directory: data-products/io-reporting
        run: databricks bundle validate -t prod
