name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Lint
        run: ruff check silver/ gold/ tests/

      - name: Test
        run: pytest

  validate-bundle:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      # notification_email has no default (a real list must be set at deploy); supply a
      # placeholder so `bundle validate` does not fail on the missing required variable.
      BUNDLE_VAR_notification_email: ci-validation@kerry.com
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      # Bundle validation needs a workspace to authenticate against. When the
      # DATABRICKS_HOST / DATABRICKS_TOKEN repository secrets are not configured
      # (Settings → Secrets → Actions), skip validation with a warning instead of
      # failing the whole job. Set both secrets to enable real validation.
      - name: Check Databricks credentials
        id: creds
        run: |
          if [ -n "$DATABRICKS_HOST" ] && [ -n "$DATABRICKS_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Bundle validation skipped::DATABRICKS_HOST/DATABRICKS_TOKEN secrets are not set; skipping databricks bundle validate. Configure them in Settings → Secrets → Actions to enable validation."
          fi

      - name: Validate dev_uat_source bundle
        if: steps.creds.outputs.configured == 'true'
        run: databricks bundle validate -t dev_uat_source

      - name: Validate dev_sample bundle
        if: steps.creds.outputs.configured == 'true'
        run: databricks bundle validate -t dev_sample

      - name: Validate uat bundle
        if: steps.creds.outputs.configured == 'true'
        run: databricks bundle validate -t uat

      - name: Validate prod bundle
        if: steps.creds.outputs.configured == 'true'
        run: databricks bundle validate -t prod
