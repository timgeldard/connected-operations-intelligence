tables:
  - name: quality_lab_characteristic_spec
    comment: "Lab-board MIC spec limits (QAMV) — one row per PRUEFLOS+VORGLFNR+MERKNR. Supplies spec limits (lsl_spec/usl_spec) and, when replicated, warning limits (lsl_warn/usl_warn) for the lab-board severity rule (fail = outside spec, warn = within warning band). Rolling window (qm_lookback_years) and quality gate matching quality_lab_inspection_result. Current-state snapshot."
    tags:
      current_status: ENFORCED
      gating_category: DIRECT_PLANT
      layer: silver
      product_area: spc
      source_tables: "inspection_qamv,inspection_qals"
    columns:
      - {name: client, comment: ""}
      - {name: inspection_lot_number, comment: ""}
      - {name: operation_id, comment: ""}
      - {name: mic_id, comment: ""}
      - {name: nominal_target, comment: ""}
      - {name: usl_spec, comment: ""}
      - {name: lsl_spec, comment: ""}
      - {name: usl_warn, comment: ""}
      - {name: lsl_warn, comment: ""}
      - {name: mic_name, comment: ""}
      - {name: uom, comment: ""}
      - {name: plant_code, comment: ""}

  - name: quality_lab_inspection_result
    comment: "Lab-board MIC-level inspection results (QAMR) — one row per PRUEFLOS+VORGLFNR+MERKNR. Rolling window (qm_lookback_years, default 5y) on lot creation date; quality gate (qm_enabled_flag only). UI day filter (ALL/360d/180d/30d) applied at query time on result recording date, not here. Designed for the lab-board wallboard gold layer (gold_qm_lab_result_signal). DO NOT merge with the SPC result-grain family (quality_inspection_result, spc gate) — they serve different product areas; this table reconciles with that one within the shared window once SPC Phase 1 merges. Current-state snapshot (AEDATTM only)."
    tags:
      current_status: ENFORCED
      gating_category: DIRECT_PLANT
      layer: silver
      product_area: spc
      source_tables: "inspection_qamr,inspection_qals,inspection_qamv"
    columns:
      - {name: client, comment: ""}
      - {name: inspection_lot_number, comment: ""}
      - {name: operation_id, comment: ""}
      - {name: mic_id, comment: ""}
      - {name: quantitative_result, comment: ""}
      - {name: qualitative_result, comment: ""}
      - {name: inspection_result_valuation, comment: ""}
      - {name: inspection_result, comment: ""}
      - {name: result_recording_start_date, comment: ""}
      - {name: result_recording_end_date, comment: ""}
      - {name: inspector, comment: ""}
      - {name: plant_code, comment: ""}
      - {name: lot_order_number, comment: ""}
      - {name: batch_number, comment: ""}
      - {name: lot_origin_code, comment: ""}
      - {name: material_code, comment: ""}

