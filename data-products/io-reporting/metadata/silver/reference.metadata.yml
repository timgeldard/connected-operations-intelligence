  - name: material_allergen
    comment: "SAP classification-derived allergen map. Source: AUSP (KLART='001', ATINN=0000000849) joined to CAWNT (SPRAS='E') from central_services (published catalog). Grain: one row per material_code × allergen value (ATINN × ATZHL) — a material with multiple allergens produces multiple rows; do NOT collapse. AUSP.OBJEK for KLART='001' is the zero-padded MATNR directly (no INOB hop). Ungated and estate-wide: material classification has no WERKS dimension. Coverage caveat: ~25.7% of materials carry allergen classification (2026-06-12). Absence of a row means UNCLASSIFIED, NOT allergen-free — downstream joins must be LEFT and must NOT infer safety from silence."
    tags:
      current_status: EXEMPT
      gating_category: D
      layer: silver
      product_area: ioreporting
      source_tables: "objectcharacteristics_ausp,characteristicvaluedescription_cawnt"
    columns: []

  - name: material_uom_conversion
