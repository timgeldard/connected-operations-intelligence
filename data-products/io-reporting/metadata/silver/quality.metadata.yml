# UC metadata skeleton — silver base tables.
# Generated by scripts/_gen_metadata_skeletons.py — populate comments in backfill phase.
tables:
  - name: quality_inspection_characteristic
    comment: "MIC spec per inspection lot × operation × characteristic (QAMV) — one row per PRUEFLOS+VORGLFNR+MERKNR. Supplies SPC spec limits (nominal_target/usl_spec/lsl_spec) and characteristic metadata. Plant- and time-gated via the parent QALS lot under the spc gate (qm_enabled_flag AND spc_enabled_flag). Current-state snapshot (AEDATTM only)."
    tags:
      current_status: ENFORCED
      gating_category: DIRECT_PLANT
      layer: silver
      product_area: spc
      source_tables: "inspection_qamv,inspection_qals"
    columns:
      - {name: client, comment: ""}
      - {name: inspection_lot_number, comment: ""}
      - {name: operation_id, comment: ""}
      - {name: mic_id, comment: ""}
      - {name: nominal_target, comment: ""}
      - {name: usl_spec, comment: ""}
      - {name: lsl_spec, comment: ""}
      - {name: mic_name, comment: ""}
      - {name: inspection_method, comment: ""}
      - {name: uom, comment: ""}
      - {name: mic_code, comment: ""}
      - {name: mic_version, comment: ""}
      - {name: characteristic_type, comment: ""}
      - {name: spc_criterion, comment: ""}
      - {name: decimal_places, comment: ""}
      - {name: plant_code, comment: ""}

  - name: quality_inspection_individual_result
    comment: "Individual inspection readings (QASE) — one row per PRUEFLOS+VORGLFNR+MERKNR+PROBENR+DETAILERG. MESSWERT is the RAW individual reading (NOT a sample mean — that is QASR.MITTELWERT). This is the deepest result grain, feeding SPC chart individual values. Plant- and time-gated via parent QALS lot under the spc gate. Current-state snapshot (AEDATTM only)."
    tags:
      current_status: ENFORCED
      gating_category: DIRECT_PLANT
      layer: silver
      product_area: spc
      source_tables: "inspection_qase,inspection_qals"
    columns:
      - {name: client, comment: ""}
      - {name: inspection_lot_number, comment: ""}
      - {name: operation_id, comment: ""}
      - {name: mic_id, comment: ""}
      - {name: sample_number, comment: ""}
      - {name: individual_result_number, comment: ""}
      - {name: quantitative_result, comment: ""}
      - {name: qualitative_result, comment: ""}
      - {name: inspection_result_valuation, comment: ""}
      - {name: inspection_result, comment: ""}
      - {name: plant_code, comment: ""}

  - name: quality_inspection_lot
    comment: "Quality inspection lots (QALS) — one row per lot, trace-relevant estate, rolling qm_lookback_years window (default 5y) on lot creation date. Gate: trace_lot = qm_enabled onboarded plants ∪ lifecycle NOT IN (SOLD/DIVESTED_ON_SAP) — ADR 016 §4. Fallback when site_lifecycle absent: qm_enabled set only (4-plant behaviour). Required by Final Trace (batch passport / journey QM context) across the estate. Current-state snapshot (QALS has no CDC sequencing metadata — AEDATTM only). Usage decisions live in the 1:many child quality_inspection_usage_decision, NOT on the lot. Result grain (QAMV/QAMR/QASR/QASE) deliberately NOT widened — stays on spc gate."
    tags:
      current_status: ENFORCED
      gating_category: DIRECT_PLANT
      layer: silver
      product_area: trace_lot
      source_tables: inspection_qals
    columns:
      - {name: client, comment: ""}
      - {name: inspection_lot_number, comment: ""}
      - {name: plant_code, comment: ""}
      - {name: inspection_type, comment: ""}
      - {name: inspection_lot_origin_code, comment: ""}
      - {name: inspection_lot_quantity, comment: ""}
      - {name: inspection_lot_uom, comment: ""}
      - {name: material_code, comment: ""}
      - {name: material_code_raw, comment: ""}
      - {name: batch_number, comment: ""}
      - {name: batch_number_raw, comment: ""}
      - {name: order_number, comment: ""}
      - {name: order_number_raw, comment: ""}
      - {name: inspection_start_date, comment: ""}
      - {name: inspection_end_date, comment: ""}
      - {name: lot_created_date, comment: ""}
      - {name: created_by, comment: ""}
      - {name: created_date, comment: ""}
      - {name: updated_by, comment: ""}
      - {name: updated_on, comment: ""}

  - name: quality_inspection_result
    comment: "MIC-level inspection results (QAMR) — one row per PRUEFLOS+VORGLFNR+MERKNR. Contains quantitative/qualitative result, MBEWERTG accept/reject valuation, and result-recording dates (PRUEFDATUV/PRUEFDATUB — distinct from the lot's planned inspection window PASTRTERM/PAENDTERM). Plant- and time-gated via parent QALS lot under the spc gate. Current-state snapshot (AEDATTM only)."
    tags:
      current_status: ENFORCED
      gating_category: DIRECT_PLANT
      layer: silver
      product_area: spc
      source_tables: "inspection_qamr,inspection_qals"
    columns:
      - {name: client, comment: ""}
      - {name: inspection_lot_number, comment: ""}
      - {name: operation_id, comment: ""}
      - {name: mic_id, comment: ""}
      - {name: quantitative_result, comment: ""}
      - {name: qualitative_result, comment: ""}
      - {name: inspection_result_valuation, comment: ""}
      - {name: inspection_result, comment: ""}
      - {name: number_of_defects_found, comment: ""}
      - {name: result_recording_start_date, comment: ""}
      - {name: result_recording_end_date, comment: ""}
      - {name: inspector, comment: ""}
      - {name: min_value, comment: ""}
      - {name: max_value, comment: ""}
      - {name: plant_code, comment: ""}

  - name: quality_inspection_sample_result
    comment: "Per-sample inspection results (QASR) — one row per PRUEFLOS+VORGLFNR+MERKNR+PROBENR. MITTELWERT is the per-SAMPLE MEAN (aggregate over individual readings within the sample), distinct from QASE.MESSWERT which is the raw individual reading. Plant- and time-gated via parent QALS lot under the spc gate. Current-state snapshot (AEDATTM only)."
    tags:
      current_status: ENFORCED
      gating_category: DIRECT_PLANT
      layer: silver
      product_area: spc
      source_tables: "inspection_qasr,inspection_qals"
    columns:
      - {name: client, comment: ""}
      - {name: inspection_lot_number, comment: ""}
      - {name: operation_id, comment: ""}
      - {name: mic_id, comment: ""}
      - {name: sample_number, comment: ""}
      - {name: quantitative_result, comment: ""}
      - {name: qualitative_result, comment: ""}
      - {name: inspection_result_valuation, comment: ""}
      - {name: inspection_result, comment: ""}
      - {name: plant_code, comment: ""}

  - name: quality_inspection_usage_decision
    comment: "Usage decisions (QAVE) — one row per decision (PRUEFLOS+KZART+ZAEHLER); a lot can carry many. Accept/reject is VBEWERTUNG (A/R, confirmed from data), NOT the plant-configurable VCODE catalog code. Plant- and time-gated via the parent QALS lot (QAVE.VWERKS is the central responsible plant 'R001', not the lot's plant — gate-via-parent). Gate: trace_lot = qm_enabled onboarded plants ∪ lifecycle NOT IN (SOLD/DIVESTED_ON_SAP) — ADR 016 §4. Fallback when site_lifecycle absent: qm_enabled set only. Current-state snapshot (AEDATTM only)."
    tags:
      current_status: ENFORCED
      gating_category: DIRECT_PLANT
      layer: silver
      product_area: trace_lot
      source_tables: "inspection_qave,inspection_qals"
    columns:
      - {name: client, comment: ""}
      - {name: inspection_lot_number, comment: ""}
      - {name: plant_code, comment: ""}
      - {name: inspection_lot_type, comment: ""}
      - {name: usage_decision_counter, comment: ""}
      - {name: usage_decision_code, comment: ""}
      - {name: usage_decision_code_group, comment: ""}
      - {name: usage_decision_valuation, comment: ""}
      - {name: usage_decision, comment: ""}
      - {name: usage_decision_date, comment: ""}
      - {name: usage_decision_by, comment: ""}
      - {name: quality_score, comment: ""}
      - {name: follow_up_action, comment: ""}
      - {name: responsible_plant_code, comment: ""}

