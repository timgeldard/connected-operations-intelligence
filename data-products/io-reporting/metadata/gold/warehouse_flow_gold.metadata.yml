# UC metadata skeleton — gold base tables.
# Generated by scripts/_gen_metadata_skeletons.py — populate comments in backfill phase.
tables:
  - name: gold_delivery_pick_status
    comment: "OUTBOUND delivery pick progress (picked vs delivery quantity) by delivery. Filtered to non-inbound document types (delivery_type NOT IN ('EL','ELST')) using LFART as an interim direction proxy — verified against UAT type mix 2026-06-11. Row counts dropped ~65% vs the prior unfiltered version; that is the fix, not a regression. See gold_wm_inbound_deliveries for EL/ELST inbound counterpart."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: customer_id, comment: ""}
      - {name: customer_name, comment: ""}
      - {name: ship_to_customer_name, comment: ""}
      - {name: sold_to_customer_name, comment: ""}
      - {name: gross_weight, comment: ""}
      - {name: gross_weight_unit, comment: ""}
      - {name: has_mixed_base_uom, comment: ""}
      - {name: has_unconverted_delivery_qty, comment: ""}
      - {name: pick_fraction, comment: ""}
      - {name: is_shipped, comment: ""}

  - name: gold_dispensary_backlog
    comment: "Open dispensary / line-pick backlog by plant and supply area, using movement_type_classification.is_production_consumption."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: open_task_count, comment: ""}
      - {name: open_order_count, comment: ""}
      - {name: total_open_qty, comment: ""}
      - {name: total_required_qty, comment: ""}
      - {name: earliest_requirement_date, comment: ""}
      - {name: earliest_scheduled_start_date, comment: ""}

  - name: gold_goods_movement_activity
    comment: "Goods-movement activity feed at MSEG-line grain (IM postings joined to the movement-type classification). High-volume table: consumers MUST filter on a bounded posting_date window — the serving route enforces a default 1-day window and a hard 31-day maximum (see plan section 5, cost controls)."
    tags:
      layer: gold
      product_area: ioreporting
    columns:
      - {name: is_goods_receipt, comment: ""}
      - {name: is_goods_issue, comment: ""}
      - {name: is_transfer, comment: ""}
      - {name: is_reversal, comment: ""}

  - name: gold_hu_reconciliation
    comment: "Handling-unit packed quantity reconciled to WM quant stock by plant × warehouse × material × batch. Supports HU/batch traceability checks."
    tags:
      layer: gold
      product_area: ioreporting
    columns:
      - {name: handling_unit_count, comment: ""}
      - {name: handling_unit_item_count, comment: ""}
      - {name: hu_packed_quantity, comment: ""}
      - {name: sscc_count, comment: ""}
      - {name: wm_quant_count, comment: ""}
      - {name: wm_quantity, comment: ""}

  - name: gold_lineside_stock
    comment: "Current stock staged in production / line-side storage types, by material and batch."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: quant_count, comment: ""}
      - {name: total_qty, comment: ""}
      - {name: available_qty, comment: ""}
      - {name: earliest_expiry_date, comment: ""}
      - {name: earliest_goods_receipt_date, comment: ""}

  - name: gold_movement_reconciliation
    comment: "IM goods movement postings reconciled to WM confirmed transfer-order activity by plant × warehouse × posting/confirmation date × material × batch."
    tags:
      layer: gold
      product_area: ioreporting
    columns:
      - {name: im_document_line_count, comment: ""}
      - {name: im_movement_quantity, comment: ""}
      - {name: im_movement_value, comment: ""}
      - {name: posting_date, comment: ""}
      - {name: wm_to_line_count, comment: ""}
      - {name: wm_confirmed_quantity, comment: ""}

  - name: gold_physical_inventory_recon
    comment: "Physical inventory count-vs-book reconciliation from IKPF/ISEG, including difference posting and material-document evidence."
    tags:
      layer: gold
      product_area: ioreporting
    columns: []

  - name: gold_process_order_staging
    comment: Process-order component staging completion (confirmed transfer orders vs total) per order.
    tags:
      layer: gold
      product_area: process_order
    columns:
      - {name: material_name, comment: ""}
      - {name: uom, comment: ""}
      - {name: to_items_total, comment: ""}
      - {name: to_items_done, comment: ""}
      - {name: staging_fraction, comment: ""}
      - {name: is_operationally_trusted, comment: ""}

  - name: gold_process_order_staging_validation
    comment: "Per-plant/warehouse validation of the LTAK BETYP='F' source-reference assumption used by gold_process_order_staging. Classifies each plant/warehouse as VALIDATED (>=95% BENUM matches a known process order), NOT_VALIDATED (F-type TOs present but low match rate), or NOT_APPLICABLE (no F-type staging TOs for this plant/warehouse)."
    tags:
      layer: gold
      product_area: process_order
    columns:
      - {name: total_to_headers, comment: ""}
      - {name: f_type_to_headers, comment: ""}
      - {name: f_type_benum_matched, comment: ""}

  - name: gold_reconciliation_alerts
    comment: "Alert-ready reconciliation exceptions for severe IM↔WM, HU, movement, and physical inventory variances."
    tags:
      layer: gold
      product_area: ioreporting
    columns:
      - {name: alert_key, comment: ""}
      - {name: alert_type, comment: ""}
      - {name: alert_priority, comment: ""}
      - {name: warehouse_number, comment: ""}
      - {name: reason_code, comment: ""}
      - {name: alert_context_json, comment: ""}

  - name: gold_reconciliation_audit_log
    comment: "Current-state audit register for reconciliation exceptions. Append-only trend history is captured by the warehouse snapshot job."
    tags:
      layer: gold
      product_area: ioreporting
    columns:
      - {name: audit_event_key, comment: ""}
      - {name: source_table, comment: ""}

  - name: gold_stock_holds
    comment: "Current quant-level holds (Quality, Blocked, Restricted) in WM."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: storage_bin, comment: ""}
      - {name: quantity, comment: ""}

  - name: gold_stock_reconciliation
    comment: "IM book stock (MARD) vs WM bin stock variance, with valuation, ABC class, and interim stock split, by plant and material."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: is_operationally_trusted, comment: ""}

  - name: gold_stock_reconciliation_exceptions_v2
    comment: "Non-reconciled rows from gold_stock_reconciliation_v2, enriched with material description. Use as the starting point for variance investigation."
    tags:
      layer: gold
      product_area: warehouse
    columns: []

  - name: gold_stock_reconciliation_summary
    comment: "Canonical summary of IM↔WM stock reconciliation by plant × warehouse × mismatch reason. Backed by gold_stock_reconciliation_v2."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: reconciliation_status, comment: ""}

  - name: gold_stock_reconciliation_summary_v2
    comment: "Summary of gold_stock_reconciliation_v2 rolled up by plant × warehouse × mismatch_reason × mismatch_severity."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: row_count, comment: ""}
      - {name: exception_count, comment: ""}
      - {name: tolerance_exceeded_count, comment: ""}
      - {name: abs_delta_quantity_total, comment: ""}
      - {name: abs_delta_value_total, comment: ""}

  - name: gold_stock_reconciliation_v2
    comment: "Detailed IM↔WM stock reconciliation at plant × warehouse × material × batch × stock_category grain. Compares MCHB/MARD (IM) with LQUA/storage_bin (WM). See docs/reconciliation/stock-reconciliation-v2-contract.md."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: reconciliation_rule_version, comment: ""}
      - {name: last_reconciled_at, comment: ""}

  - name: gold_stock_value_reconciliation
    comment: "Value-control rollup of IM↔WM reconciliation v2 by plant × warehouse × mismatch reason. Uses material valuation where available."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: row_count, comment: ""}
      - {name: tolerance_exceeded_count, comment: ""}
      - {name: net_delta_value, comment: ""}
      - {name: abs_delta_value, comment: ""}
      - {name: abs_delta_quantity, comment: ""}

  - name: gold_storage_type_role_coverage_status
    comment: "Per-plant/warehouse coverage of storage_type_role_mapping config vs in-use storage types. VALIDATED = all active storage types are config-mapped; PARTIAL = some mapped, some not; MISSING = no config rows for this warehouse. Use to identify gaps before relying on gold_lineside_stock or gold_stock_reconciliation for a plant/warehouse."
    tags:
      layer: gold
      product_area: ioreporting
    columns:
      - {name: total_storage_types, comment: ""}
      - {name: mapped_storage_types, comment: ""}

  - name: gold_transfer_order_open_items
    comment: Current open transfer-order items (pick tasks).
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: source_storage_bin, comment: ""}
      - {name: destination_storage_bin, comment: ""}
      - {name: order_reference_type, comment: ""}
      - {name: order_reference_number, comment: ""}

  - name: gold_transfer_requirement_open_items
    comment: Current open transfer-requirement items (move requests).
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: source_storage_bin, comment: ""}
      - {name: destination_storage_bin, comment: ""}
      - {name: order_reference_type, comment: ""}
      - {name: order_reference_number, comment: ""}

  - name: gold_wm_inbound_deliveries
    comment: "Inbound deliveries (LFART EL=standard inbound, ELST=inbound stock transport) with expected receipt date (LIKP.WADAT renamed), line counts, delivery quantity, pick/GR progress, and status rollup. Sourced from gold_delivery_pick_status's counterpart (the EL/ELST subset of silver.outbound_delivery). Vendor/partner columns are not available in silver.outbound_delivery (ship_to/sold_to are SAP customer fields on LIKP; inbound deliveries carry the supplier via a different field not currently replicated). Verified against UAT type mix 2026-06-11: EL=178,632 ELST=2,651."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: gross_weight, comment: ""}
      - {name: gross_weight_unit, comment: ""}
      - {name: has_mixed_base_uom, comment: ""}
      - {name: has_unconverted_delivery_qty, comment: ""}
      - {name: receipt_fraction, comment: ""}
      - {name: is_received, comment: ""}

