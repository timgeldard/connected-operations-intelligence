# UC metadata skeleton — gold base tables.
# Generated by scripts/_gen_metadata_skeletons.py — populate comments in backfill phase.
tables:
  - name: gold_wm_adherence_root_cause
    comment: "Order-grain adherence miss root-cause classification for Production Progress. One row per candidate miss (plant_code × order_number): scheduled_finish_date present AND (actual_finish_date > scheduled_finish_date OR actual_finish_date IS NULL for open-late candidates — consumption view derives is_open_late via CURRENT_DATE). Classification precedence (first match wins): 1 LATE_RELEASE — actual_release_date > scheduled_start_date; 2 MATERIAL_SHORT — any gold_wm_order_component_variance row with variance_qty < -{_MATERIAL_SHORT_TOLERANCE}; 3 CAPACITY — not late release, no material short, but production_first_actual_start is >24h after actual_release_date (gold_wm_order_journey_summary); 4 UNCLASSIFIED. Evidence columns retained for UI drill-down. Deterministic: no current_date(). cluster_by plant_code, scheduled_finish_date."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: material_name, comment: ""}
      - {name: order_qty, comment: ""}
      - {name: uom, comment: ""}
      - {name: root_cause_class, comment: ""}
      - {name: is_late_release, comment: ""}
      - {name: has_material_short, comment: ""}
      - {name: shortfall_component_count, comment: ""}
      - {name: release_to_production_hours, comment: ""}

  - name: gold_wm_bin_stock_detail
    comment: "Quant-grain stock & bin explorer: every occupied bin with storage-zone classification (dispensary / production supply / palletising / interim / warehouse), stock category, block flags and expiry. The dispensary stock-health view is this table filtered to storage_zone = 'DISPENSARY'. Empty bins are excluded (bin-capacity views are served by gold_bin_occupancy)."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: storage_zone, comment: ""}
      - {name: stock_category, comment: ""}
      - {name: is_blocked_for_stock_removal, comment: ""}
      - {name: is_blocked_for_putaway, comment: ""}
      - {name: is_bin_blocked, comment: ""}

  - name: gold_wm_campaign_summary
    comment: "Campaign-grouped picking progress (LTBK ZZ_CAMPAIGN — WMA-E-29/50 shared-material campaign picking): TR/status counts, orders covered, operators, quantities."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: tr_count, comment: ""}
      - {name: complete_trs, comment: ""}
      - {name: in_progress_trs, comment: ""}
      - {name: parked_trs, comment: ""}
      - {name: no_stock_trs, comment: ""}
      - {name: order_count, comment: ""}
      - {name: operator_count, comment: ""}
      - {name: work_area, comment: ""}
      - {name: required_qty, comment: ""}
      - {name: open_qty, comment: ""}
      - {name: earliest_planned_datetime, comment: ""}
      - {name: earliest_created_datetime, comment: ""}

  - name: gold_wm_daily_activity
    comment: "Daily warehouse activity series per plant: TO items confirmed, TRs created, and IM goods receipts/issues. Deterministic facts (no snapshots) for trend charts."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: activity_date, comment: ""}
      - {name: goods_receipt_lines, comment: ""}
      - {name: goods_issue_lines, comment: ""}

  - name: gold_wm_daily_activity_baseline
    comment: "Day-of-week baseline bands for daily warehouse activity metrics per plant. Grain: one row per plant_code × metric_name × day_of_week (1=Sun … 7=Sat). Computed via unpivot of gold_wm_daily_activity then percentile_approx groupBy. Partial-day exclusion is query-time (consumption view filters activity_date < CURRENT_DATE()); all rows present in gold_wm_daily_activity are included here (SAP extracts are closed daily). No current_date()/current_timestamp() — deterministic base MV."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: day_of_week, comment: ""}
      - {name: median_value, comment: ""}
      - {name: p10_value, comment: ""}
      - {name: p90_value, comment: ""}
      - {name: sample_days, comment: ""}

  - name: gold_wm_downtime_event_detail
    comment: "Production downtime events at event grain — passthrough of the key columns from silver.downtime_event for drill-through in the Production Health view. Feeds the recent-events table and order-number drill-through."
    tags:
      layer: gold
      product_area: warehouse
    columns: []

  - name: gold_wm_downtime_pareto
    comment: "Weekly production downtime pareto: plant_code × week_start × downtime_reason_code × sub_reason_code × work_centre_code grain. week_start = date_trunc('week', start_datetime) cast to DATE. Aggregates event_count, total/avg duration, and distinct order count. Rows with NULL start_datetime are excluded. Feeds the Production Health view."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: downtime_reason_description, comment: ""}
      - {name: sub_reason_description, comment: ""}
      - {name: production_line_description, comment: ""}
      - {name: event_count, comment: ""}
      - {name: total_duration_minutes, comment: ""}
      - {name: avg_duration_minutes, comment: ""}
      - {name: distinct_order_count, comment: ""}

  - name: gold_wm_expiry_risk
    comment: "Plant/material/batch shelf-life risk from plant-scoped MCHB batch stock enriched with client-level MCH1 batch master expiry/manufacture dates and MBEW valuation. Gold carries deterministic expiry_date only; days_to_expiry and expiry bands are computed in the consumption view. FEFO v1 flags later-expiring stocked batches that have issue evidence (261/601) while an earlier-expiring batch for the same plant/material remains on hand."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: fefo_risk_flag, comment: ""}

  - name: gold_wm_lineside_lines
    comment: "Distinct production lines with active order count — line picker for the Lineside Monitor config panel. Grain: plant_code × production_line. active_order_count: COUNT of running orders (released, not finished, not closed). line_label: production_line_description (first non-null) or production_line when no description is available. Source: process_order (production_line, production_line_description — CRVER/recipe classification). Deterministic: no current_date(). cluster_by plant_code."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: line_label, comment: ""}
      - {name: active_order_count, comment: ""}

  - name: gold_wm_lineside_now
    comment: "Running orders + current-phase surface for the Lineside Monitor wall display. Grain: plant_code × production_line × order_number — one row per order currently in execution (released by date-evidence, actual_finish_date IS NULL, has at least one confirmed operation OR confirmed_yield_quantity > 0). current_operation_number / current_operation_description / current_activity_type: derived from the latest is_confirmed process_order_operation row (OPERATION_CONFIRMED logic — same pattern as gold_wm_order_journey_events). pct_complete: yield_pct from gold_wm_order_yield via dlt.read, clamped 0–100. planned_minutes: scheduled_finish_datetime − scheduled_start_datetime in minutes (integer — datediff of timestamps). production_first_actual_start: carried from process_order.actual_start_date cast as timestamp (wall-clock elapsed computed AT QUERY TIME in _live / consumption view). batch: single batch_number where exactly one distinct non-null batch is confirmed across operations; null when multiple batches or none. elapsed_minutes and projected_finish are NOT in this MV — they are computed in the consumption view using CURRENT_TIMESTAMP() (ADR 012 wall-clock rule). Deterministic: no current_date()/current_timestamp(). cluster_by plant_code, production_line."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: material_name, comment: ""}
      - {name: pct_complete, comment: ""}
      - {name: current_operation_number, comment: ""}
      - {name: current_operation_description, comment: ""}
      - {name: current_activity_type, comment: ""}

  - name: gold_wm_operator_activity
    comment: "RF operator pick activity at plant x warehouse x operator x confirmation-date grain, from confirmed transfer-order items (LTAP QNAME/QDATU). Quantity totals mix base UoMs — item counts are the comparable measure."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: operator, comment: ""}
      - {name: activity_date, comment: ""}
      - {name: items_confirmed, comment: ""}
      - {name: transfer_orders, comment: ""}
      - {name: materials, comment: ""}
      - {name: transfer_requirements, comment: ""}
      - {name: confirmed_qty, comment: ""}

  - name: gold_wm_order_component_detail
    comment: "Component-level staging detail for active process orders — the drill-through behind Order Readiness. One row per component reservation with material-level TR coverage (LTBK BETYP='P'), staging-TO pick progress (LTAK BETYP='F'), and order-keyed PSA bin supply. TR/TO/PSA rollups are at order x material grain (silver TR items do not carry RSPOS), so components sharing a material show the same pool — flagged via material_component_count."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: uom, comment: ""}

  - name: gold_wm_order_component_variance
    comment: "Order + material grain material variance for the Yield & Loss analytics waterfall. One row per plant_code × order_number × material_code. Sources: reservation_requirement (RESB) aggregated to order+material grain (sum required_quantity, sum withdrawn_quantity per order+material) then joined to goods_movement net issues (261 minus 262 per order+material). Silver goods_movement carries no reservation references (MSEG has no RSNUM/RSPOS mapping in the replication schema), so joining at reservation grain would double-count issued_qty when an order has multiple RESB rows for the same material. Quantities stay in each row's own base_uom — no cross-material aggregation. est_loss_value: (issued_qty - required_qty) × standard_price / price_unit from material_valuation (same source as gold_wm_slow_movers / gold_wm_qm_disposition_queue). NULL when standard_price is absent. Deletion-flagged and zero-required-qty reservations are excluded. No current_date()/current_timestamp() — deterministic base MV. cluster_by plant_code, order_number."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: material_name, comment: ""}
      - {name: uom, comment: ""}
      - {name: required_qty, comment: ""}
      - {name: withdrawn_qty, comment: ""}
      - {name: issued_qty, comment: ""}
      - {name: variance_qty, comment: ""}
      - {name: variance_pct, comment: ""}
      - {name: est_loss_value, comment: ""}

  - name: gold_wm_order_journey_events
    comment: "Long-format per-order event timeline for the Order Journey Timeline view -- one row per event, identified by (plant_code, order_number, event_seq). Sources UNION ALL: ORDER_CREATED / RELEASED from process_order; TR_CREATED from warehouse_transfer_requirement (BETYP='P'); STAGING_CONFIRMED from warehouse_transfer_order items (Fully Confirmed, via TBNUM->BETYP='P' TR chain); PI_START / PI_END from pi_sheet_execution (left/optional); OPERATION_CONFIRMED from process_order_operation (is_confirmed=true); GR_POSTED from goods_movement (movement_type 101 by order_number); COMPONENT_ISSUED from goods_movement (261 family); QM_LOT_CREATED / QM_UD_TAKEN from quality_inspection_lot + usage decision (source-guarded). event_seq = row_number over event_ts NULLS LAST within plant_code x order_number. Deterministic: no current_date(). cluster_by plant_code x order_number."
    tags:
      layer: gold
      product_area: warehouse
    columns: []

  - name: gold_wm_order_journey_summary
    comment: "Per-order milestone summary for the Order Journey Timeline view -- one row per plant_code x order_number. Milestones from five sources joined by order_number: process_order (created/release/scheduled dates, production_line, material), warehouse_transfer_requirement (staging: first TR created ts, first/last staging confirmed ts, item counts via TBNUM linkage), process_order_operation (production actual start/finish, confirmed yield/scrap), pi_sheet_execution (PI first/last activity -- absent at P806; left join, nullable), goods_movement (GR from 101 by order_number, GI/issue qty from 261 family, delivery_count from delivery_number where present). Derived lag columns only where both endpoints exist. Deterministic: no current_date(). cluster_by plant_code x scheduled_start_date."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: material_name, comment: ""}
      - {name: order_qty, comment: ""}
      - {name: uom, comment: ""}
      - {name: order_created_ts, comment: ""}
      - {name: release_date, comment: ""}
      - {name: staging_tr_count, comment: ""}
      - {name: staged_item_count, comment: ""}
      - {name: staged_item_total, comment: ""}
      - {name: production_last_actual_finish, comment: ""}
      - {name: confirmed_yield_qty, comment: ""}
      - {name: confirmed_scrap_qty, comment: ""}
      - {name: gr_qty, comment: ""}
      - {name: issue_qty, comment: ""}
      - {name: delivery_count, comment: ""}
      - {name: release_to_first_tr_hours, comment: ""}
      - {name: tr_to_staged_hours, comment: ""}
      - {name: staged_to_production_hours, comment: ""}
      - {name: production_to_gr_hours, comment: ""}

  - name: gold_wm_order_operations
    comment: "Process-order operations enriched with work-centre description — one row per plant_code × order_number × routing_number × operation_counter. Drill-through behind the Order Detail overlay (Item B): operation sequence, scheduled window, actual start, yield, scrap, and derived completion status. LEFT JOIN to work_centre on work_centre_internal_id + plant_code."
    tags:
      layer: gold
      product_area: warehouse
    columns: []

  - name: gold_wm_order_readiness
    comment: "Released process orders with derived TR coverage (component demand converted to transfer requirements — the WM Cockpit 'TR' status) and PSA supply status (stock in order-keyed Production Supply bins vs WM component demand — the cockpit 'ST' status). Coverage denominators use WM-managed components only (RESB rows carrying a warehouse number); quantity comparisons assume base-UoM consistency and are approximate for mixed-UoM orders."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: material_name, comment: ""}
      - {name: uom, comment: ""}

  - name: gold_wm_order_shortage_projection
    comment: "Open order-component shortage projection for the Shortage Projection board. Grain: plant_code × order_number × material_code × reservation (one row per open component demand). Scope: active open orders (released by date-evidence, not finished). projected_balance_at_demand = ledger balance_before at the component requirement_date; is_projected_short when balance_before < open quantity. first_short_date = earliest ledger event_date where running_balance < 0 for that plant×material. Deterministic: no current_date(). cluster_by plant_code, requirement_date."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: material_name, comment: ""}
      - {name: open_qty, comment: ""}
      - {name: uom, comment: ""}
      - {name: requirement_date, comment: ""}
      - {name: reservation_ref, comment: ""}
      - {name: projected_balance_at_demand, comment: ""}
      - {name: is_projected_short, comment: ""}

  - name: gold_wm_order_wip_stage
    comment: "Active process order WIP stage — one row per plant_code × order_number for orders that are released but not yet finished (the same active-order filter as gold_wm_order_readiness). Stage is derived deterministically from the milestone columns in gold_wm_order_journey_summary (joined by plant_code × order_number): RELEASED (released, no TR created yet), STAGING (first TR exists, staging_last_confirmed_ts < staging_first_confirmed_ts — i.e. staging is in progress but not yet complete across all TRs), STAGED (staging_last_confirmed_ts present, no production start yet), IN_PRODUCTION (production_first_actual_start present, no GR posted), GR_PARTIAL (first_gr_posting_date present, gr_qty < order_qty × _COVERAGE_FULL_FRACTION), GR_COMPLETE (gr_qty >= order_qty × _COVERAGE_FULL_FRACTION). Includes order qty, material, scheduled dates. No current_date/current_timestamp. cluster_by plant_code."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: material_name, comment: ""}
      - {name: first_tr_created_ts, comment: ""}
      - {name: staging_last_confirmed_ts, comment: ""}
      - {name: production_first_actual_start, comment: ""}
      - {name: first_gr_posting_date, comment: ""}
      - {name: gr_qty, comment: ""}

  - name: gold_wm_order_yield
    comment: "Order-grain yield summary for the Yield & Loss analytics view. One row per plant_code × order_number. Sources: process_order (planned qty, status, dates, production_line) and goods_movement (net GR: movement 101 minus 102 per order). planned_qty = order_quantity (AFKO.GAMNG). delivered_qty = sum of movement-101 quantities minus movement-102 quantities for the same order, null-safe. yield_pct = delivered_qty / planned_qty (guarded for null/zero planned_qty). has_goods_receipt = delivered_qty > 0. is_complete = actual_finish_date IS NOT NULL. first/last_gr_date from goods_movement posting_date. No current_date()/current_timestamp() — deterministic base MV. cluster_by plant_code, scheduled_finish_date."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: material_name, comment: ""}
      - {name: planned_qty, comment: ""}
      - {name: uom, comment: ""}
      - {name: is_released, comment: ""}
      - {name: is_completed, comment: ""}
      - {name: is_closed, comment: ""}
      - {name: is_complete, comment: ""}
      - {name: delivered_qty, comment: ""}
      - {name: yield_pct, comment: ""}
      - {name: has_goods_receipt, comment: ""}

  - name: gold_wm_pi_accuracy
    comment: "Physical-inventory count accuracy KPIs aggregated to plant × storage_location_code × cycle_counting_indicator (ABC class) × count_month grain. Source: gold_physical_inventory_recon via dlt.read — no current_date(); deterministic base MV. count_month = date_trunc('month', count_date). 'due_lines' = all PI document lines in the period (documents created/counted in that month, regardless of status) — honest denominator for coverage; recounts are counted as distinct lines as they appear in ISEG. storage_zone is intentionally null: IKPF/ISEG carry only storage_location_code (LGORT), not storage_type, so a clean join to storage_type_role_mapping is not possible. Best-effort grouping by storage_location_code is preserved; a future enhancement can add LGORT→LGTYP mapping once it is replicated. delta_value is local currency — do not sum across currencies; currency is surfaced and grouped so cross-currency aggregation is an explicit consumer choice. count_accuracy_pct and coverage_pct are query-time ratios computed here at the per-group level only (deterministic within the group). cluster_by plant_code, count_month."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: cycle_counting_indicator, comment: ""}

  - name: gold_wm_qm_disposition_queue
    comment: "QM disposition queue — open lots only (no usage decision). Enriched with blocked stock quantity (quality_inspection_quantity from batch_stock, the MCHB.CINSM field) and estimated blocked value (blocked_qty × standard_price / price_unit from material_valuation). Grain: plant_code × inspection_lot_number. Date-relative columns (lot_age_days, is_overdue) live in the qm_disposition_queue_live serving view."
    tags:
      layer: gold
      product_area: spc
    columns:
      - {name: material_name, comment: ""}
      - {name: blocked_qty, comment: ""}
      - {name: est_blocked_value, comment: ""}

  - name: gold_wm_qm_lot_context
    comment: "Quality inspection-lot context per plant x material x batch: open (no usage decision yet) lot counts and the latest decision from the 1:many QAVE child table. Joined client-side onto Stock Health held stock and Inbound to answer 'why is this batch in QI and when is the UD due'. Covers the silver QM lookback window only."
    tags:
      layer: gold
      product_area: spc
    columns:
      - {name: lot_count, comment: ""}
      - {name: open_lot_count, comment: ""}
      - {name: latest_lot_number, comment: ""}
      - {name: lot_origin_code, comment: ""}
      - {name: oldest_open_start_date, comment: ""}
      - {name: last_usage_decision, comment: ""}
      - {name: last_usage_decision_date, comment: ""}

  - name: gold_wm_qm_lot_status
    comment: "QM inspection lot status — one row per plant_code × inspection_lot_number (all lots in the silver lookback window). Carries lot header fields, material name from the material lookup, and the latest usage decision (collapsed from the 1:many QAVE child via max_by date+counter). Date-relative columns (lot_age_days, ud_lead_time_days, is_overdue) live in the qm_lot_status_live serving view (no current_date() here)."
    tags:
      layer: gold
      product_area: spc
    columns:
      - {name: material_name, comment: ""}
      - {name: has_usage_decision, comment: ""}
      - {name: last_usage_decision, comment: ""}
      - {name: last_usage_decision_date, comment: ""}
      - {name: last_usage_decision_by, comment: ""}
      - {name: quality_score, comment: ""}

  - name: gold_wm_queue_workload
    comment: "Current open WM workload by plant x warehouse x queue x work area, rolled up from the staging worklist (non-complete jobs only)."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: open_jobs, comment: ""}
      - {name: in_progress_jobs, comment: ""}
      - {name: parked_jobs, comment: ""}
      - {name: no_stock_jobs, comment: ""}
      - {name: operator_count, comment: ""}
      - {name: earliest_planned_datetime, comment: ""}
      - {name: earliest_created_datetime, comment: ""}

  - name: gold_wm_recipe_run_benchmark
    comment: "Recipe-line benchmark distribution for completed production runs. One row per plant_code × material_code × production_line, where null production_line is grouped as UNASSIGNED. Source: gold_wm_order_yield via dlt.read. Distribution includes only complete orders with goods receipt evidence (is_complete AND has_goods_receipt). run_count counts qualifying runs; yield percentiles ignore null yield_pct. Duration is last_gr_date - first_gr_date in hours and is null for zero/negative or missing GR date spans. No current_date()/current_timestamp() — deterministic base MV. cluster_by plant_code, material_code."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: production_line, comment: ""}

  - name: gold_wm_slow_movers
    comment: "Value-weighted stock aging at plant x warehouse x material x batch grain: quantity, standard-price value, and the most recent movement timestamp. Query-time age and aging buckets live in the _live view. Interim (9xx) zones excluded."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: quant_count, comment: ""}
      - {name: total_qty, comment: ""}
      - {name: last_movement_datetime, comment: ""}
      - {name: earliest_goods_receipt_date, comment: ""}
      - {name: earliest_expiry_date, comment: ""}

  - name: gold_wm_staging_buffer_flow_hourly
    comment: "Hourly flows in and out of the palletising (bulk-drop) buffer from confirmed TO items: in = destination zone PALLETISING, out = source zone PALLETISING. The app reconstructs the buffer level B(t) by cumulating net flow and anchoring the latest point to current palletising-zone stock."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: items_in, comment: ""}
      - {name: qty_in, comment: ""}
      - {name: items_out, comment: ""}
      - {name: qty_out, comment: ""}

  - name: gold_wm_staging_demand_hourly
    comment: "Planned staging demand wave: open TR quantity bucketed by planned execution hour and work area. Compared against gold_wm_staging_pace_hourly to show whether handlers are running ahead of or behind the wave."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: production_supply_area, comment: ""}
      - {name: open_trs, comment: ""}
      - {name: open_qty, comment: ""}

  - name: gold_wm_staging_pace_hourly
    comment: "Hourly material-handler throughput INTO staging buffers: confirmed TO items whose destination is a PALLETISING or PRODUCTION_SUPPLY zone, bucketed by confirmation hour. Derived from TO flows (bulk-drop log ZWMA_BULK_DROP_TO_LOG not yet replicated); feeds the staging-pace wave chart and the per-hour-of-day historical baselines (avg / best) that define what a good day looks like."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: destination_storage_type, comment: ""}
      - {name: destination_zone, comment: ""}
      - {name: items_staged, comment: ""}
      - {name: qty_staged, comment: ""}
      - {name: operators, comment: ""}

  - name: gold_wm_staging_worklist
    comment: "TR-header-grain supervisor worklist for warehouse staging and dispensary picking. One row per transfer requirement with derived work area (production staging / dispensary replenishment / dispensary picking), operational status from the site RF pick-status fields (blank=open, A=in progress, P=parked, N=no stock, C=complete), assigned RF operator/queue/campaign, and pick progress from linked transfer orders (LTAK.TBNUM). Carries deterministic demand_due_ts and a static intervention bump; query-time consumption views score urgency as overdue=100, <=2h=80, <=8h=60, <=24h=40, later=20, no demand date=10, plus +10 for PARKED/NO_STOCK. Read-only mirror of the ZWMAE0019_NEW Job Assignment grid."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: order_scheduled_start_date, comment: ""}
      - {name: demand_due_ts, comment: ""}
      - {name: priority_intervention_bump, comment: ""}
      - {name: single_material_code, comment: ""}
      - {name: single_material_description, comment: ""}
      - {name: to_item_count, comment: ""}
      - {name: to_items_confirmed, comment: ""}
      - {name: to_requested_qty, comment: ""}
      - {name: to_confirmed_qty, comment: ""}
      - {name: cycle_hours, comment: ""}
      - {name: order_production_line, comment: ""}

  - name: gold_wm_supply_demand_ledger
    comment: "Dated supply/demand ledger per plant_code × material_code for shortage projection. SUPPLY events: ON_HAND (batch_stock unrestricted qty, event_date NULL = current stock) and INBOUND_DELIVERY (open EL/ELST outbound_delivery lines with base-UOM qty only — PO lines excluded in v1 to avoid double-count with deliveries). DEMAND events: open reservation_requirement rows (movement 261 family, BDTER date). Window ordering: event_date NULLS FIRST, sort_seq (1=on-hand, 2=inbound, 3=demand), source_document_id. running_balance is cumulative signed_qty (+supply, −demand). UOM: same-material only; inbound restricted to delivery_quantity_base rows. Deterministic: no current_date(). cluster_by plant_code, material_code."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: material_name, comment: ""}

