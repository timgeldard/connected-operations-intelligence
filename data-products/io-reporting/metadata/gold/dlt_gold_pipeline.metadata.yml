# UC metadata skeleton — gold base tables.
# Generated by scripts/_gen_metadata_skeletons.py — populate comments in backfill phase.
tables:
  - name: gold_order_downtime_summary
    comment: Downtime events rolled to order × operation × reason grain with order context.
    tags:
      layer: gold
      product_area: process_order
    columns: []

  - name: gold_plant_production_quality_summary
    comment: "Plant-level production quality & downtime summary."
    tags:
      layer: gold
      product_area: spc
    columns:
      - {name: total_downtime_minutes, comment: ""}
      - {name: quality_rate, comment: ""}

  - name: gold_process_order_component_status
    comment: Per-component reservation status for active process orders with available stock coverage.
    tags:
      layer: gold
      product_area: process_order
    columns:
      - {name: reservation_item_number, comment: ""}
      - {name: available_unrestricted_qty, comment: ""}
      - {name: is_fully_covered, comment: ""}

  - name: gold_process_order_operations
    comment: "Operations Overview of process orders including schedule, confirmations, PI sheet, and downtime at operation grain."
    tags:
      layer: gold
      product_area: process_order
    columns:
      - {name: material_code, comment: ""}
      - {name: scheduled_start_date, comment: ""}
      - {name: pi_sheet_status, comment: ""}
      - {name: pi_sheet_duration_hours, comment: ""}
      - {name: total_downtime_minutes, comment: ""}
      - {name: operation_join_confidence, comment: ""}
      - {name: is_operationally_active, comment: ""}

  - name: gold_process_order_schedule_adherence
    comment: Production order schedule-adherence metrics comparing scheduled vs actual completions.
    tags:
      layer: gold
      product_area: process_order
    columns:
      - {name: is_on_time, comment: ""}
      - {name: is_in_full, comment: ""}
      - {name: is_started_on_time, comment: ""}
      - {name: fill_rate, comment: ""}
      - {name: scrap_rate, comment: ""}

  - name: gold_shift_output_summary
    comment: Daily production output summary. Aggregates quantity and scrap by posting date and plant.
    tags:
      layer: gold
      product_area: process_order
    columns:
      - {name: produced_quantity, comment: ""}
      - {name: scrap_quantity, comment: ""}

