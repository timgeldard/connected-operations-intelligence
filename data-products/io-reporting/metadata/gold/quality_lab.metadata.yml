# UC metadata skeleton — gold base tables.
# Generated by scripts/_gen_metadata_skeletons.py — populate comments in backfill phase.
tables:
  - name: gold_qm_characteristic_pareto
    comment: "QM characteristic (MIC) Pareto for the QM Command Centre drill view. Grain: plant_code × material_code × characteristic_id. Counts ALL lab results (not fails-only) from quality_lab_inspection_result over the qm_lookback_years silver window. Severity uses the shared _lab_result_severity_column rule with gold_qm_lab_result_signal. last_result_date is the per-plant×material freshness signal (max result_recording_start_date). Source-guarded when QM lab silver absent."
    tags:
      layer: gold
      product_area: spc
    columns:
      - {name: characteristic_id, comment: ""}
      - {name: characteristic_text, comment: ""}
      - {name: unit, comment: ""}
      - {name: result_count, comment: ""}
      - {name: fail_count, comment: ""}
      - {name: warn_count, comment: ""}
      - {name: last_result_date, comment: ""}

  - name: gold_qm_lab_result_signal
    comment: "Lab Board result signal: one row per failed-or-warning QM inspection result in the recent window (lab_board_lookback_days, default 30d). Feeds the Connected Quality Lab Board wallboard (quality-batch-release workspace, lab-board view). Severity: 'fail'=outside spec; 'warn'=within warning band (explicit QAMV warning limits when available; 5%-of-span approximation otherwise). Only non-accepted results are included. Production line is left-joined via lot order number — nullable."
    tags:
      layer: gold
      product_area: spc
    columns:
      - {name: material_description, comment: ""}
      - {name: characteristic_id, comment: ""}
      - {name: characteristic_text, comment: ""}
      - {name: result_value, comment: ""}
      - {name: lower_limit, comment: ""}
      - {name: upper_limit, comment: ""}
      - {name: lower_warn_limit, comment: ""}
      - {name: upper_warn_limit, comment: ""}
      - {name: unit, comment: ""}
      - {name: severity, comment: ""}
      - {name: lot_type, comment: ""}

  - name: gold_qm_ud_code_pareto
    comment: "QM usage-decision code Pareto for the QM Command Centre drill view. Grain: plant_code × usage_decision_code. Plant attribution uses the parent lot plant (quality_inspection_usage_decision.plant_code from QALS.WERK gate — NOT QAVE.VWERKS). lot_count = distinct inspection lots per code; last_decision_date is the freshness signal. Source-guarded when QM UD silver absent."
    tags:
      layer: gold
      product_area: spc
    columns:
      - {name: lot_count, comment: ""}
      - {name: last_decision_date, comment: ""}

