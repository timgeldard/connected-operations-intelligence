# UC metadata skeleton — gold base tables.
# Generated by scripts/_gen_metadata_skeletons.py — populate comments in backfill phase.
tables:
  - name: gold_batch_event_ledger
    comment: "Directional per-batch event ledger derived from gold_batch_lineage. One row per (batch × plant × direction) event, exploding each directed edge into per-batch rows so a single batch's full movement history is queryable without graph traversal. DIRECTION SEMANTICS: PRODUCTION — parent side: OUT (batch consumed into child order); child side: IN (batch produced by the process order). STO_TRANSFER / BATCH_TRANSFER / MATERIAL_TRANSFER — parent side: OUT (batch sent); child side: IN (batch received). VENDOR_RECEIPT — child side only: IN (received from supplier; parent NULL). DELIVERY — parent side only: OUT (shipped to customer; child NULL). ADJUSTMENT_IN — child side: IN (stock write-on). ADJUSTMENT_OUT — parent side: OUT (stock write-off). COUNTERPART columns carry the opposite endpoint identity: COUNTERPART_MATERIAL_ID / COUNTERPART_BATCH_ID / COUNTERPART_PLANT_ID. VENDOR_RECEIPT IN rows: SUPPLIER_ID + PURCHASE_ORDER_ID populated. DELIVERY OUT rows: CUSTOMER_ID + DELIVERY_ID + SALES_ORDER_ID populated. PRODUCTION / TRANSFER rows: PROCESS_ORDER_ID + MATERIAL_DOCUMENT_NUMBER populated. Source: dlt.read('gold_batch_lineage') — intra-pipeline DLT dependency. Security: capability tier — NOT in GOLD_TABLES; GRANT added to resources/sql/trace_security_{env}.sql (traceability-readers group, tolerated failure). Grain: two rows per two-sided edge (OUT for parent, IN for child); one row per one-sided edge (VENDOR_RECEIPT IN only; DELIVERY OUT only). Phase 2 use cases: mass-balance timeline, supplier-batch panel, recall-readiness counts. Deterministic base (no current_date / current_timestamp)."
    tags:
      layer: gold
      product_area: ioreporting
    columns:
      - {name: MATERIAL_ID, comment: ""}
      - {name: BATCH_ID, comment: ""}
      - {name: PLANT_ID, comment: ""}
      - {name: plant_code, comment: ""}
      - {name: direction, comment: ""}
      - {name: COUNTERPART_MATERIAL_ID, comment: ""}
      - {name: COUNTERPART_BATCH_ID, comment: ""}
      - {name: COUNTERPART_PLANT_ID, comment: ""}

  - name: gold_batch_lineage
    comment: "Governed batch traceability edge list — T2 of the Final Trace migration (ADR 016). One row per directed traceability edge: PARENT_* → CHILD_* with LINK_TYPE classifying the relationship. Five legs: PRODUCTION (CHVW × MSEG GR), STO/BATCH/MATERIAL_TRANSFER (CHVW receiving side), VENDOR_RECEIPT (MSEG PO receipt), DELIVERY (MSEG outbound issue), ADJUSTMENT_IN / ADJUSTMENT_OUT (MSEG stock adjustments). Lifecycle-gated: SOLD / DIVESTED_ON_SAP endpoint plants excluded (ADR 016 §2). Column names are the verbatim legacy contract (deliberate snake_case exception, ADR 016 §3). Security: capability-tier GRANT via trace_security_{env}.sql; no RLS row filter on the MV (T3 search views carry the per-user predicate). Grain: one edge per (parent_material × parent_batch × parent_plant × child_material × child_batch × child_plant × link_type × process_order_id × material_document_number). Deterministic base (no current_date / current_timestamp). NOTE: first materialisation requires a full gold pipeline run; parity check vs legacy link-type counts is the orchestrator's post-rollout step."
    tags:
      layer: gold
      product_area: ioreporting
    columns: []

  - name: gold_batch_stock_summary
    comment: "Batch-grain stock position from silver.batch_stock (MCHB-derived). One row per (plant_code, material_code, batch_number) with the six SAP stock-category quantities: unrestricted, quality_inspection, blocked, restricted_use, in_transfer, blocked_returns — plus total_quantity (sum of all categories) and base_unit_of_measure. Source: silver.batch_stock (plant-gated current-state MCHB snapshot; one row per material × plant × storage_location × batch). Grain: this MV aggregates across storage locations, collapsing to the batch level so each (plant_code, material_code, batch_number) appears once. Use case: batch-level stock position for the trace2 fan-out — the Phase 2 recall-readiness and mass-balance panels need a governed batch-stock position rather than the ungated legacy gold_batch_stock_v. Standard plant RLS: expose plant_code; governed via gold_batch_stock_summary_secured (scripts/generate_gold_security_sql.py GOLD_TABLES). NOTE: quantities are summed across all storage locations for a given plant/material/batch. Phase 2 consumers requiring storage-location granularity should read silver.batch_stock. Deterministic base (no current_date / current_timestamp)."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: total_quantity, comment: ""}

  - name: gold_trace_anchor
    comment: "Governed batch traceability anchor index — T3 of the Final Trace migration (ADR 016). One row per (MATERIAL_ID, BATCH_ID, PLANT_ID) entry point that a user may initiate a trace from. Built by unioning the parent and child endpoint sides of gold_batch_lineage and aggregating to a batch-plant grain with date-range and directional edge counts. ANCHORABILITY GATE (ADR 016 §3): only plants with effective_lifecycle = 'ACTIVE' are retained. This is deliberately the OPPOSITE default from the edge MV's keep-unknowns policy — edges keep unknown plants for graph continuity (ADR 016 §2 pass-through), but anchors require explicit ACTIVE because a trace may only be INITIATED from a reviewed- active plant; CLOSED and unconfirmed-review plants are traversable but not anchorable. Null/blank BATCH_ID rows are excluded (an anchor is a batch-level entry point). Null PLANT_ID rows are excluded (RLS predicate cannot apply to a null plant). plant_code = PLANT_ID (lowercase contract column for the RLS predicate). Security: ADDED to generate_gold_security_sql.py GOLD_TABLES — served via gold_trace_anchor_secured with standard plant_code CSM predicate (application_key = 'io_reporting'). Deterministic base (no current_date / current_timestamp). NOTE: app batch-search switchover from the legacy search surface to this anchor tier is a separate follow-up task."
    tags:
      layer: gold
      product_area: traceability
    columns:
      - {name: plant_code, comment: ""}

  - name: gold_trace_batch_material
    comment: "Batch–supplier-batch linkage for traceability fan-out: (material_code, batch_number) → SUPPLIER_BATCH_ID (vendor's own batch identifier). Source: silver.batch_where_used (CHVW), which carries LICHA (vendor batch) on rows where a batch was received from a supplier (LICHA populated on VENDOR_RECEIPT rows). SOURCE DECISION — MCH1/MCHA NOT used: SAP MCH1 (client-level batch master, material + batch grain, carries LICHA/MFRGR/VFDAT) and MCHA (plant-level batch, carries LICHA) are listed in the data dictionary but are NOT replicated into the connected_plant.sap source schema (no bronze table batchmaster_mch1 or equivalent exists — confirmed by absence of any MCH1/MCHA reference in pipeline code outside of generate_data_dictionary.py). An ingestion request for MCH1 would unlock manufacture_date (MFRGR) and expiry_date (VFDAT) which are also missing from the governed stack; raise as a follow-up ingestion request. CHVW.LICHA IS available (confirmed in silver/tables/traceability.py, _CHVW_REQUIRED list, line 62) and is already surfaced in silver.batch_where_used.vendor_batch_number. GRAIN: one row per (material_code, batch_number) — SUPPLIER_BATCH_ID deduplicated with F.max (a batch has at most one supplier batch reference; max() is a stable tiebreak in the rare case LICHA changes across CHVW rows for the same batch). NULL / blank LICHA rows are excluded (no vendor batch = no useful linkage). Legacy contract target: gold_batch_material — MATERIAL_ID, BATCH_ID, SUPPLIER_BATCH_ID. Security: capability tier — NOT in GOLD_TABLES; GRANT added to resources/sql/trace_security_{env}.sql (traceability-readers group, tolerated failure). NOTE: silver.batch_where_used is built by the slow reference pipeline (estate-wide CHVW snapshot). This gold MV reads it via spark.read.table (cross-pipeline Delta read). Deterministic base (no current_date / current_timestamp)."
    tags:
      layer: gold
      product_area: traceability
    columns:
      - {name: MATERIAL_ID, comment: ""}
      - {name: BATCH_ID, comment: ""}

  - name: gold_trace_material
    comment: "Material lookup for traceability fan-out: material_code → material_description, material_type, material_group, base_uom. Source: silver.material (MARA + MARC + MAKT, plant-scoped). GRAIN DECISION: silver.material is one row per (plant_code, material_code) because MARA attributes live on MARC/plant rows. This MV aggregates across plants using F.max (deterministic — same description for a given material_code regardless of plant; max() is a stable tiebreak that avoids arbitrary ordering). One row per material_code. LANGUAGE: silver.material is pre-filtered to MAKT.SPRAS='E' (English) in reference.py — all rows are English; the LANGUAGE_ID='E' convention from legacy gold_material is preserved as a literal column so adapter SQL can JOIN on LANGUAGE_ID = 'E' unchanged. CONSUMER GRAIN: trace2 adapters join on MATERIAL_ID only (no plant), matching the plant-independent grain produced here. The legacy gold_material carried one row per (MATERIAL_ID) with a LANGUAGE_ID column — this MV matches that contract. Security: capability tier — NOT in GOLD_TABLES; GRANT added to resources/sql/trace_security_{env}.sql (traceability-readers group, tolerated failure). NOTE: silver.material is built by the slow reference pipeline. This gold MV reads it via spark.read.table (cross-pipeline Delta read). Deterministic base (no current_date / current_timestamp)."
    tags:
      layer: gold
      product_area: traceability
    columns:
      - {name: MATERIAL_ID, comment: ""}
      - {name: LANGUAGE_ID, comment: ""}

  - name: gold_trace_plant
    comment: "Plant lookup for traceability fan-out: plant_code → plant_name, country_key. Source decision: silver.plant (T001W via published central_services) UNION silver.site_lifecycle (estate-wide ~550-plant dimension, ADR 016). silver.plant covers actively-replicated plants; site_lifecycle fills in estate plants not yet in T001W (e.g. plants reviewed as CLOSED/SOLD that are in the traceability graph but not in the live plant master). Per-side dedup then FULL OUTER join with F.coalesce — silver.plant (T001W) values are preferred wherever both sources carry the plant; site_lifecycle fills estate-only plants. silver.site_lifecycle.country maps to country_key (same attribute, different column name). GRAIN: one row per plant_code (F.max tiebreak for determinism). CONSUMER GRAIN: trace2 adapters join on PLANT_ID only, matching this grain. Legacy contract target: gold_plant — PLANT_ID, PLANT_NAME (adapters reference p.PLANT_ID, p.PLANT_NAME). Security: capability tier — NOT in GOLD_TABLES; GRANT added to resources/sql/trace_security_{env}.sql (traceability-readers group, tolerated failure). NOTE: silver.plant and silver.site_lifecycle are built by the slow reference pipeline. This gold MV reads them via spark.read.table (cross-pipeline Delta reads). Deterministic base (no current_date / current_timestamp)."
    tags:
      layer: gold
      product_area: traceability
    columns:
      - {name: PLANT_ID, comment: ""}
      - {name: PLANT_NAME, comment: ""}
      - {name: country_key, comment: ""}

  - name: gold_trace_vendor
    comment: "Vendor lookup for traceability fan-out: vendor_code → vendor_name, country_key. Source: silver.vendor (LFA1 via published_<env>.central_services.vendormaster_lfa1). One row per vendor_code. Vendor names are used in the Phase 2 supplier-batch panel to resolve SUPPLIER_ID → display name without a per-query join to the heavy LFA1 table. SUPPLIER_ID in gold_batch_lineage / gold_batch_event_ledger is the vendor_code from silver.purchase_order (EKKO.LIFNR → vendor_code after strip_zeros), which matches the vendor_code PK of silver.vendor. Grain: one row per vendor_code (deduped). Security: capability tier — NOT in GOLD_TABLES; GRANT added to resources/sql/trace_security_{env}.sql (traceability-readers group, tolerated failure). NOTE: silver.vendor is built by the slow reference pipeline. This gold MV reads it via spark.read.table (cross-pipeline Delta read). Deterministic base (no current_date / current_timestamp)."
    tags:
      layer: gold
      product_area: traceability
    columns:
      - {name: vendor_name, comment: ""}
      - {name: country_key, comment: ""}

