# UC metadata skeleton — gold base tables.
# Generated by scripts/_gen_metadata_skeletons.py — populate comments in backfill phase.
tables:
  - name: gold_handling_unit_summary
    comment: "Handling-unit (SSCC) summary by plant, warehouse and status."
    tags:
      layer: gold
      product_area: ioreporting
    columns:
      - {name: total_gross_weight, comment: ""}
      - {name: hu_item_count, comment: ""}
      - {name: distinct_sscc_count, comment: ""}
      - {name: distinct_hu_count, comment: ""}
      - {name: linked_delivery_count, comment: ""}
      - {name: distinct_material_count, comment: ""}

  - name: gold_inbound_po_backlog
    comment: "Open inbound purchase-order backlog (PO items awaiting goods receipt) by plant and \" \"vendor. Backlog only — does NOT use GR history / remaining quantity (see design_spec)."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: open_item_count, comment: ""}
      - {name: open_po_count, comment: ""}
      - {name: total_ordered_qty, comment: ""}
      - {name: total_open_value, comment: ""}
      - {name: earliest_po_date, comment: ""}
      - {name: qa_inspection_item_count, comment: ""}

  - name: gold_inbound_po_backlog_enhanced
    comment: "Enhanced open inbound purchase-order backlog by plant and vendor, including PO-linked 103/104 goods-receipt quantity, remaining open quantity, putaway TO evidence, and age anchors."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: putaway_to_count, comment: ""}
      - {name: confirmed_putaway_to_count, comment: ""}

  - name: gold_inbound_po_line_backlog
    comment: "Open inbound purchase-order backlog at PO-LINE grain (one row per plant x PO x item; items \" \"not delivery-complete and not deleted). First-wave core EKKO/EKPO fields + material name; \" \"GR/open quantity, delivery date, QA status, vendor name are future enrichment (design_spec)."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: plant_code, comment: ""}
      - {name: po_id, comment: ""}
      - {name: po_item, comment: ""}
      - {name: doc_type, comment: ""}
      - {name: vendor_id, comment: ""}
      - {name: storage_loc, comment: ""}
      - {name: material_id, comment: ""}
      - {name: material_name, comment: ""}
      - {name: ordered_qty, comment: ""}
      - {name: uom, comment: ""}
      - {name: po_date, comment: ""}

