# UC metadata skeleton — gold base tables.
# Generated by scripts/_gen_metadata_skeletons.py — populate comments in backfill phase.
tables:
  - name: gold_bin_occupancy
    comment: "Current warehouse bin occupancy by warehouse, plant, storage type, and bin type."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: occupancy_rate, comment: ""}
      - {name: quant_utilisation_fraction, comment: ""}

  - name: gold_inbound_outbound_throughput
    comment: "Inbound, outbound, transfer, and adjustment throughput by plant, storage location, and date."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: net_qty, comment: ""}

  - name: gold_stock_availability
    comment: "Current stock availability by plant, storage location, material, batch, and base UOM."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: available_qty, comment: ""}
      - {name: unavailable_qty, comment: ""}
      - {name: total_stock_qty, comment: ""}

  - name: gold_stock_expiry_risk
    comment: "Current batch stock expiry risk by plant, material, batch, and base UOM."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: minimum_expiry_date, comment: ""}
      - {name: earliest_goods_receipt_date, comment: ""}
      - {name: shelf_life_days, comment: ""}
      - {name: minimum_remaining_shelf_life_days, comment: ""}
      - {name: total_stock_qty, comment: ""}

  - name: gold_transfer_order_performance
    comment: "Transfer-order operator performance by warehouse, plant, date, and source storage type."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: confirmed_by_user, comment: ""}
      - {name: pick_accuracy, comment: ""}
      - {name: processing_time_unit, comment: ""}

  - name: gold_transfer_requirement_backlog
    comment: "Current open transfer-requirement backlog by warehouse, plant, queue, and source/destination storage."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: open_quantity_rate, comment: ""}

  - name: gold_transfer_requirement_material_backlog
    comment: "Open transfer-requirement backlog aggregated to plant x material — material-level shortfall \" \"for the Warehouse360 shortfalls governed view (ADR-0004 D2). Open = not processing-complete \" \"with open_quantity > 0. Aggregated across warehouses/queues to the contract's plant x material grain."
    tags:
      layer: gold
      product_area: warehouse
    columns:
      - {name: material_id, comment: ""}
      - {name: oldest_tr_creation_date, comment: ""}

