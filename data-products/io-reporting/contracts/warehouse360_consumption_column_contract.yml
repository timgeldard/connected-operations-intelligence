# Warehouse360 consumption-view ↔ Gold column contract.
#
# Used by scripts/ci/check_warehouse360_consumption_columns.py to statically verify that every
# source column selected by resources/sql/warehouse360_consumption_views_*.sql resolves against the
# actual Gold serving view it reads FROM — catching the consumption-vs-Gold drift found in PR #39.
#
# gold_source_columns: snapshot of each Gold serving view's columns, CAPTURED FROM DEV
#   (connected_plant_dev.gold_io_reporting) on 2026-06-08. Regenerate when the Gold schema changes.
# approved_aliases: documented gold_column -> contract_field renames applied in the consumption SQL.
# approved_exceptions: source identifiers a consumption view references that DO NOT resolve against its
#   Gold source — i.e. documented, not-live-validated blockers (missing columns or grain mismatch).
#   Listing one here lets CI pass while the blocker is tracked; remove it once the Gold source provides
#   the column (or the contract drops it). The view is NOT live-validated until its list is empty.

gold_source_columns:
  gold_warehouse_kpi_snapshot_secured: [active_order_count, bin_utilisation_pct, blocked_bin_count, occupied_bin_count, open_delivery_count, open_inbound_item_count, open_to_item_count, open_tr_item_count, plant_code, snapshot_date, total_bin_count]
  gold_inbound_po_backlog_enhanced_live: [confirmed_putaway_to_count, earliest_po_date, fully_gr_item_count, inbound_backlog_risk_band, item_without_gr_count, latest_gr_posting_date, latest_putaway_to_confirmed_date, oldest_po_age_days, oldest_putaway_to_created_datetime, open_item_count, open_po_count, partial_gr_item_count, plant_code, purchasing_org, putaway_to_count, qa_inspection_item_count, remaining_open_qty, total_gr_qty, total_open_value, total_ordered_qty, vendor_code]
  gold_inbound_po_line_backlog_live: [doc_type, inbound_backlog_risk_band, material_id, material_name, oldest_po_age_days, ordered_qty, plant_code, po_date, po_id, po_item, storage_loc, uom, vendor_id]
  gold_delivery_pick_status_live: [actual_goods_issue_date, base_uom_count, customer_id, customer_name, days_to_goods_issue, delivery_date, delivery_number, delivery_qty, delivery_type, gross_weight, gross_weight_unit, has_mixed_base_uom, has_unconverted_delivery_qty, is_shipped, line_count, null_delivery_base_count, pick_fraction, picked_qty, planned_goods_issue_date, plant_code, risk_band, ship_to_customer, ship_to_customer_name, sold_to_customer, sold_to_customer_name, warehouse_number]
  gold_process_order_staging_live: [days_to_start, is_operationally_trusted, material_code, material_name, order_number, order_quantity, plant_code, risk_band, scheduled_finish_date, scheduled_start_date, staging_fraction, to_items_done, to_items_total, uom]
  gold_stock_expiry_risk_live: [base_uom, batch_number, earliest_goods_receipt_date, expired_qty, expiry_ok_qty, expiry_risk_30_90d_qty, expiry_risk_7_30d_qty, expiry_risk_lt_7d_qty, has_minimum_shelf_life_breach, highest_expiry_risk_bucket, material_code, material_description, minimum_days_to_expiry, minimum_expiry_date, minimum_remaining_shelf_life_days, minimum_shelf_life_breach_qty, plant_code, shelf_life_days, total_stock_qty]
  gold_transfer_requirement_backlog: [backlog_item_count, destination_storage_type, oldest_created_datetime, oldest_planned_execution_datetime, open_qty, open_quantity_rate, plant_code, queue, required_qty, source_storage_type, transfer_priority, warehouse_number]
  gold_transfer_requirement_material_backlog_secured: [material_id, oldest_tr_creation_date, open_tr_items, open_tr_qty, plant_code]
  gold_warehouse_exceptions: [age_days, batch_number, detail, detected_date, exception_type, material_code, plant_code, quantity, reference_id, severity, sla_hours, warehouse_number]

# gold_column -> contract-facing field (mechanical, safe renames applied in the consumption SQL).
approved_aliases:
  plant_code: plant_id
  material_code: material_id
  batch_number: batch_id
  delivery_number: delivery_id
  order_number: order_id
  order_quantity: order_qty
  quantity: qty
  detail: detail_text

# Documented blockers per consumption view (source identifier -> reason). View is not-live-validated
# until its list is empty. NOT auto-filled with NULLs — these columns are absent from the Gold source.
# Exception values classify the blocker + name the candidate source (evidence 2026-06-08). See
# docs/decisions/ADR-0004-warehouse360-backlog-grain-and-missing-columns.md for the resolution decisions.
# Classes: grain-redesign-required | missing-but-available-upstream | missing-requires-dimension-join |
#          missing-no-source | contract-semantic-decision.
approved_exceptions:
  vw_consumption_warehouse360_overview: {}   # creates; data-quality only (null plant_code) — ADR-0004 D7.
  vw_consumption_warehouse360_inbound_backlog: {}   # ADR-0004 D1: now reads gold_inbound_po_line_backlog (PO-line grain from silver.purchase_order). Core fields resolve; gr_qty/open_qty/delivery_date/qa_status/vendor_name deferred (future enrichment, removed from the view). View now live-validatable.
  vw_consumption_warehouse360_outbound_backlog: {}   # ADR-0004 D4: carrier removed from first-wave consumption SQL + contract (no replicated source — shipment/VBPA not replicated). Future-enrichment candidate; view now live-validatable.
  vw_consumption_warehouse360_staging_workload: {}   # ADR-0004 D3: first wave reduced to ORDER grain (plant x order). Component fields reservation_no/batch_id + semantic-duplicate sap_order deferred to a future staging_components contract. View now live-validatable.
  vw_consumption_warehouse360_stock_exceptions: {}   # ADR-0004 D5: storage_location_id removed from first wave (IM/LGORT axis absent from the WM-bin x material x batch expiry-risk gold source). Future-enrichment candidate; view now live-validatable.
  vw_consumption_warehouse360_shortfalls: {}   # ADR-0004 D2: reads gold_transfer_requirement_material_backlog (plant x material aggregate of open TRs from silver.warehouse_transfer_requirement, via the RLS-secured view). View now live-validatable.
  vw_consumption_warehouse360_im_wm_reconciliation: {}   # ADR-0004 D6: first wave re-grained to an AGGREGATE exception summary (plant x material x batch x exception_type) — storage_location_id/bin_id removed (no stable per-exception variance key upstream; reference_id ~99% null). View now live-validatable; detail-grain is future work.
