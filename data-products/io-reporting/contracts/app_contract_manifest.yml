      - plant_id
      - order_id
    freshness:
      expected_minutes: 15
      warning_minutes: 30
      critical_minutes: 60
    access_policy:
      row_level_key: plant_id
      entitlement_source: published.central_services.user_plant_access
    fields:
      - name: plant_id
        type: string
        required: true
        description: SAP plant ID
      - name: order_id
        type: string
        required: true
        description: Process order identifier
      - name: material_id
        type: string
        required: false
        description: Material code being staged
      - name: order_qty
        type: decimal
        required: false
        description: Process order total quantity
      - name: uom
        type: string
        required: false
        description: Unit of measure
      - name: material_name
        type: string
        required: false
        description: Material description
      - name: sched_start
