environment_targets:
  dev:
    catalog: connected_plant_dev
    schema: gold_io_reporting
  uat:
    catalog: connected_plant_uat
    schema: gold_io_reporting
  prod:
    catalog: connected_plant_prod
    schema: gold_io_reporting

source_schema_assumption:
  dev_sap_matches_uat_sap: true
  dev_sap_catalog: connected_plant_dev
  dev_sap_schema: sap
  uat_sap_catalog: connected_plant_uat
  uat_sap_schema: sap

# DEV is a technical shakedown only; UAT is the first full-validation environment.
# See docs/architecture/adr-ioreporting-dev-shakedown-vs-uat-validation.md.
validation_modes:
  dev:
    deployment_mode: dev_shakedown
    enable_hu_reconciliation: false
    purpose: Validate deployment mechanics and non-HU contract structure only — NOT business validation (DEV data is old/limited and not business-representative).
    hu_dependent_outputs: not materialised in DEV; HU-dependent outputs remain NOT business-validated here.
    note: None of the 7 Warehouse360 governed source objects depend on HU, so non-HU contract structure can be shaken down in DEV.
  uat:
    deployment_mode: full_validation
    enable_hu_reconciliation: true
    purpose: First environment for full HU/business validation; requires published_uat.central_services incl. handlingunit_vekp/vepo.

# HU-dependent models excluded in DEV shakedown (none are in the Warehouse360 critical path):
hu_dependent_models:
  - handling_unit               # silver (inbound.py)
  - gold_hu_reconciliation      # gold
  - gold_handling_unit_summary  # gold
  - gold_reconciliation_alerts (HU branch only)

unresolved_assumptions:
  - DEV is a technical shakedown only; no Warehouse360 contract is business-validated from DEV, and HU-dependent outputs are not validated until UAT.
  - DEV validation has not yet confirmed that all governed source objects exist in connected_plant_dev.gold_io_reporting.
  - DEV validation has not yet confirmed that source columns used by warehouse360_consumption_views_dev.sql are present and type-compatible.
  - Candidate primary keys remain pending live duplicate checks before contract promotion.
  - Required plant_id and candidate key nullability remain pending live checks before app test sign-off.
  - Date and timestamp field typing remains pending live information_schema review before UAT planning.
  - Freshness evidence is only expected for views with an explicit freshness column unless a source-specific exception is documented.
  - Runtime route coverage is expected for active Wave 1 views only; dashboard-only candidate views still require route decisions.

views:
  - name: vw_consumption_warehouse360_overview
    contract_id: warehouse360.overview
    expected_grain: one row per plant_id + snapshot timestamp
    primary_key:
      - plant_id
      - snapshot_ts
    row_level_key: plant_id
    must_not_be_null:
      - plant_id
      - snapshot_ts
    expected_columns:
      - name: plant_id
        type: string
      - name: snapshot_ts
        type: timestamp
      - name: orders_total
        type: long
      - name: orders_red
        type: long
      - name: orders_amber
        type: long
      - name: trs_open
        type: long
      - name: tos_open
        type: long
      - name: deliveries_today
        type: long
      - name: deliveries_at_risk
        type: long
      - name: inbound_open
        type: long
      - name: bins_blocked
        type: long
      - name: bins_total
        type: long
      - name: bin_util_pct
        type: decimal
    freshness_column: snapshot_ts
    runtime_route_exists: true
    dashboard_consumption_expected: true
    live_validation_required:
      - primary_key_uniqueness
      - plant_id_nullability
      - type_compatibility
      - row_count
      - freshness

  - name: vw_consumption_warehouse360_inbound_backlog
