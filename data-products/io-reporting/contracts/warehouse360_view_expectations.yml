      - name: storage_loc
        type: string
      - name: material_id
        type: string
      - name: material_name
        type: string
      - name: ordered_qty
        type: decimal
      - name: gr_qty
        type: decimal
      - name: uom
        type: string
      - name: delivery_date
        type: string
      - name: po_date
