resources:
  pipelines:
    silver_fast_pipeline:
      name: "[${bundle.target}] Connected Plant — Silver Fast"
      catalog: ${var.catalog}
      schema: ${var.schema}

      serverless: true
      continuous: true
      photon: true
      channel: CURRENT
      development: false

      tags:
        owner: connected-plant-team
        cost-center: connected-plant
        project: ops-reporting

      configuration:
        source_catalog: ${var.source_catalog}
        source_schema: ${var.source_schema}
        # process_order reads the process-line classification map from the slow-tier
        # silver.recipe_process_line reference table (built by the slow pipeline from
        # central_services INOB/AUSP/CAWNT) instead of scanning AUSP itself — so the fast pipeline
        # no longer needs the published/central_services source configured. The map is read
        # UNCONDITIONALLY (no tableExists guard — this is a continuous pipeline; a guard would bake an
        # empty fallback into the plan for the life of the update). DEPLOY ORDER: run the slow pipeline
        # once (to create recipe_process_line) BEFORE first starting this continuous fast pipeline,
        # otherwise it fails loud at startup with table-not-found.
        recipe_process_line_table: ${var.catalog}.${var.schema}.recipe_process_line
        # Force sort-merge over broadcast joins. The stg_warehouse_transfer_order stream-static join
        # (changed_keys ⋈ LTAP[i.*, 165 wide var-len cols] ⋈ LTAK) made Photon build a
        # BroadcastHashedRelation that ran the executor out of memory (SparkOutOfMemoryError, var-len
        # data) once the flow became runtime-reachable. -1 disables auto-broadcast so the build spills
        # to disk via SMJ instead of OOMing. Verified on DEV: transfer_order completes, 0 OOM, the other
        # stream-static flows (goods_movement, warehouse_transfer_requirement) tolerate SMJ. NOTE: the
        # broadcast OOM is pre-existing in the join structure — unreachable while the flow failed at
        # analysis on the legacy ANFME/ENQTY fields (resolved in PR #23).
        # ⚠ PRE-PROD DECISION (not an optional tidy-up): this conf is pipeline-WIDE and has no per-target
        # override, so UAT/PROD inherit it. On this CONTINUOUS pipeline at prod volume, forcing SMJ on
        # every join (incl. small dimension joins that broadcast cheaply) can be a real throughput
        # regression. Before promoting, decide between (a) keeping the global disable, or (b) replacing it
        # with a targeted merge hint on the transfer_order LTAP/LTAK join only and restoring auto-broadcast
        # elsewhere. DEV is fine either way; this is a forward-looking prod throughput call.
        spark.sql.autoBroadcastJoinThreshold: "-1"
        pipelines.defaultTableProperties.custom_tags.owner: connected-plant-team
        pipelines.defaultTableProperties.custom_tags.cost-center: connected-plant
        pipelines.defaultTableProperties.custom_tags.project: ops-reporting

      libraries:
        - file:
            path: ../silver/dlt_silver_fast.py

      # Editable-install the synced bundle root so the `silver`/`gold` packages are importable
      # at DLT runtime (the entrypoint does `import silver.tables.*`). Without this the bundle
      # root is not on sys.path and the run fails with ModuleNotFoundError: No module named 'silver'.
      # ${workspace.file_path} is the deployed bundle files root (contains pyproject.toml).
      environment:
        dependencies:
          - --editable ${workspace.file_path}

      # Daily restart window — low-traffic period (UTC)
      restart_window:
        start_hour: 2
        time_zone_id: UTC

      notifications:
        - email_recipients:
            - ${var.notification_email}
          alerts:
            - on-update-failure
            - on-update-fatal-failure
            - on-flow-failure

      permissions:
        - level: CAN_VIEW
          group_name: users
