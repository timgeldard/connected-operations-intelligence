resources:
  pipelines:
    silver_quality_pipeline:
      name: "[${bundle.target}] Connected Plant — Silver Quality"
      catalog: ${var.catalog}
      schema: ${var.schema}

      serverless: true
      continuous: false
      photon: true
      channel: CURRENT
      development: false

      tags:
        owner: connected-plant-team
        cost-center: connected-plant
        project: ops-reporting

      configuration:
        source_catalog: ${var.source_catalog}
        source_schema: ${var.source_schema}
        # Plant stage-gate config (quality product area = qm_enabled_flag). The slow pipeline
        # must have built site_config_plant before this pipeline runs (same dependency as fast).
        site_config_plant_table: ${var.catalog}.${var.schema}.site_config_plant
        # Estate-wide lifecycle dimension for the trace_lot gate (ADR 016 §4).
        # The slow pipeline builds site_lifecycle from site_lifecycle_config; this pipeline
        # reads it to resolve the trace-relevant plant set (NOT IN SOLD/DIVESTED_ON_SAP).
        # Absent / unconfigured: _trace_relevant_plants_df() falls back to empty set → gate
        # reduces to qm_enabled set only (4-plant behaviour, never wider). No fail-loud here.
        site_lifecycle_table: ${var.catalog}.${var.schema}.site_lifecycle
        # Time gate for the very large QM sources (inspection_qals is 16.7M lots all-plants in
        # UAT): lots older than this many years (by ENSTEHDAT lot creation) are excluded at the
        # source read. Snapshot-MV recompute self-corrects when this changes — no full refresh.
        qm_lookback_years: "5"
        # Short lookback window for the lab-board result/spec tables (quality_lab_inspection_result
        # + quality_lab_characteristic_spec). 30 days keeps scans tiny for a real-time wallboard.
        # Snapshot MV self-corrects on change. Independent of qm_lookback_years.
        lab_board_lookback_days: "30"
        pipelines.defaultTableProperties.custom_tags.owner: connected-plant-team
        pipelines.defaultTableProperties.custom_tags.cost-center: connected-plant
        pipelines.defaultTableProperties.custom_tags.project: ops-reporting

      libraries:
        - file:
            path: ../silver/dlt_silver_quality.py

      # Editable-install the synced bundle root so the `silver`/`gold` packages are importable
      # at DLT runtime (entrypoint does `import silver.tables.*`). Without this: ModuleNotFoundError.
      environment:
        dependencies:
          - --editable ${workspace.file_path}

      notifications:
        - email_recipients:
            - ${var.notification_email}
          alerts:
            - on-update-failure
            - on-update-fatal-failure
            - on-flow-failure

      permissions:
        - level: CAN_VIEW
          group_name: users
