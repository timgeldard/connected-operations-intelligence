resources:
  pipelines:
    gold_pipeline:
      name: "[${bundle.target}] Connected Plant — Gold"
      catalog: ${var.catalog}
      schema: ${var.gold_schema}

      serverless: true
      continuous: false
      photon: true
      channel: CURRENT
      development: false

      tags:
        owner: connected-plant-team
        cost-center: connected-plant
        project: ops-reporting

      configuration:
        silver_catalog: ${var.catalog}
        silver_schema: ${var.schema}
        pipelines.defaultTableProperties.custom_tags.owner: connected-plant-team
        pipelines.defaultTableProperties.custom_tags.cost-center: connected-plant
        pipelines.defaultTableProperties.custom_tags.project: ops-reporting

      libraries:
        # Double-asterisk glob: Databricks pipeline settings reject a single '*' glob.
        # '../gold/**' matches the top-level Gold DLT modules; the two subdir scripts
        # (gold/recon/reconciliation_job.py, gold/snapshots/warehouse_snapshot.py) are
        # standalone JOB entrypoints — they define no module-level @dlt tables and guard
        # all logic under __main__, so they are inert when loaded as pipeline libraries.
        - glob:
            include: ../gold/**

      # Triggered pipeline, no restart_window needed as it runs to completion

      notifications:
        - email_recipients:
            - ${var.notification_email}
          alerts:
            - on-update-failure
            - on-update-fatal-failure
            - on-flow-failure

      permissions:
        - level: CAN_VIEW
          group_name: users
