resources:
  pipelines:
    silver_slow_pipeline:
      name: "[${bundle.target}] Connected Plant — Silver Reference"
      catalog: ${var.catalog}
      schema: ${var.schema}

      serverless: true
      continuous: false
      photon: true
      channel: CURRENT
      development: false

      tags:
        owner: connected-plant-team
        cost-center: connected-plant
        project: ops-reporting

      configuration:
        source_catalog: ${var.source_catalog}
        source_schema: ${var.source_schema}
        published_catalog: ${var.published_catalog}
        published_schema: ${var.published_schema}
        # Shakedown vs full-validation. When enable_hu_reconciliation=false the HU silver
        # table (handling_unit, reads published.handlingunit_vekp/vepo) is NOT defined, so a
        # central_services missing the HU tables does not block the non-HU shakedown.
        deployment_mode: ${var.deployment_mode}
        enable_hu_reconciliation: ${var.enable_hu_reconciliation}
        # Governed storage-type→role config table (admin-maintained; seeded from
        # resources/config/storage_type_role_mapping.csv). storage_type_role_mapping reads it when
        # present, else falls back to the embedded bootstrap seed.
        storage_role_config_table: ${var.catalog}.${var.schema}.storage_type_role_mapping_config
        site_config_plant_table: ${var.catalog}.${var.schema}.site_config_plant
        site_config_warehouse_table: ${var.catalog}.${var.schema}.site_config_warehouse
        site_config_storage_type_role_table: ${var.catalog}.${var.schema}.site_config_storage_type_role
        site_config_movement_type_classification_table: ${var.catalog}.${var.schema}.site_config_movement_type_classification
        site_config_staging_method_table: ${var.catalog}.${var.schema}.site_config_staging_method
        site_config_kpi_enablement_table: ${var.catalog}.${var.schema}.site_config_kpi_enablement
        pipelines.defaultTableProperties.custom_tags.owner: connected-plant-team
        pipelines.defaultTableProperties.custom_tags.cost-center: connected-plant
        pipelines.defaultTableProperties.custom_tags.project: ops-reporting

      libraries:
        - file:
            path: ../silver/dlt_silver_slow.py

      # Editable-install the synced bundle root so the `silver`/`gold` packages are importable
      # at DLT runtime (entrypoint does `import silver.tables.*`). Without this: ModuleNotFoundError.
      environment:
        dependencies:
          - --editable ${workspace.file_path}

      notifications:
        - email_recipients:
            - ${var.notification_email}
          alerts:
            - on-update-failure
            - on-update-fatal-failure
            - on-flow-failure

      permissions:
        - level: CAN_VIEW
          group_name: users
