bundle:
  name: connected-plant

include:
  - resources/*.yml

variables:
  catalog:
    default: connected_plant_dev
  schema:
    default: silver_dev
  gold_schema:
    default: gold_io_reporting
  source_catalog:
    default: connected_plant_dev
  source_schema:
    default: sap_sample
  published_catalog:
    default: published_uat
  published_schema:
    default: central_services
  notification_email:
    description: Required notification distribution list for pipeline and job failures.

targets:
  # DEV-native target: deploys into the DEV workspace (profile TG) reading the real
  # connected_plant_dev.sap source (131 SAP tables, structurally matching UAT). This is
  # the only dev target whose source is actually visible from the DEV workspace —
  # connected_plant_uat is NOT bound there (see dev_uat_source) and sap_sample does not
  # exist (see dev_sample). Governed serving layer lands in gold_io_reporting (matching
  # UAT/PROD and the Warehouse360 consumption views). See
  # docs/architecture/adr-ioreporting-dev-deployment-baseline.md.
  dev:
    default: true
    mode: development
    workspace:
      profile: TG
    variables:
      catalog: connected_plant_dev
      schema: silver_dev
      gold_schema: gold_io_reporting
      source_catalog: connected_plant_dev
      source_schema: sap
      # Self-contained DEV: central_services is seeded inside the DEV catalog
      # (resources/sql/sample_central_services_dev.sql); published_uat is not reachable
      # from the DEV workspace.
      published_catalog: connected_plant_dev
      published_schema: central_services
    resources:
      pipelines:
        silver_fast_pipeline:
          development: true
        silver_slow_pipeline:
          development: true
        silver_quality_pipeline:
          development: true
        gold_pipeline:
          development: true

  # dev_uat_source: dev compute against the LIVE UAT source. Only usable from a workspace
  # where connected_plant_uat is bound (it is NOT bound in the DEV workspace adb-3548…18).
  dev_uat_source:
    mode: development
    workspace:
      profile: TG
    variables:
      catalog: connected_plant_dev
      schema: silver_dev
      gold_schema: gold_io_reporting
      source_catalog: connected_plant_uat
      source_schema: sap
      published_catalog: published_uat
      published_schema: central_services
    resources:
      pipelines:
        silver_fast_pipeline:
          development: true
        silver_slow_pipeline:
          development: true
        silver_quality_pipeline:
          development: true
        gold_pipeline:
          development: true

  dev_sample:
    mode: development
    workspace:
      profile: TG
    variables:
      catalog: connected_plant_dev
      schema: silver_dev
      gold_schema: gold_io_reporting
      source_catalog: connected_plant_dev
      source_schema: sap_sample
      # Fully isolated sample environment: published_* points at a sampled central_services in the
      # DEV catalog (not live UAT), seeded once via resources/sql/sample_central_services_dev.sql.
      # So dev_sample reads only connected_plant_dev at runtime — no reach into published_uat.
      published_catalog: connected_plant_dev
      published_schema: central_services
    resources:
      pipelines:
        silver_fast_pipeline:
          development: true
        silver_slow_pipeline:
          development: true
        silver_quality_pipeline:
          development: true
        gold_pipeline:
          development: true

  uat:
    mode: production
    workspace:
      profile: uat
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: connected_plant_uat
      schema: silver_io_reporting
      gold_schema: gold_io_reporting
      source_catalog: connected_plant_uat
      source_schema: sap
      published_catalog: published_uat
      published_schema: central_services

  prod:
    mode: production
    workspace:
      profile: prod
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: connected_plant_prod
      schema: silver_io_reporting
      gold_schema: gold_io_reporting
      source_catalog: connected_plant_prod
      source_schema: sap
      published_catalog: published_prod
      published_schema: central_services
