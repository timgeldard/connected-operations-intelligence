  - id: pp_pi_flows_missing_cdc_metadata
    models: [stg_process_order_operation, stg_pi_sheet_execution, stg_downtime_event]
    file: silver/tables/process_order.py
    summary: "WAS: 3 PP/PI silver_fast flows blocked on absent AERUNID/AERECNO CDC metadata. UPDATE 2026-06-11: process_order_operation and downtime_event REMODELLED as current-state snapshot MVs (sign-off Tim Geldard; bronze AFVV 94M rows pre-gated via AFVC.WERKS before the join; downtime carries denormalised reason/sub-reason texts + masters downtimereason_zpexpm_dwntrcode / reasonfordowntime_zpexpm_dtsubrcde now in bronze). Only pi_sheet_execution remains source-guarded on CDC metadata."
    # Live information_schema.columns 2026-06-07 (profile TG): which CDC cols each source carries.
    cdc_metadata_by_source:
      - {table: processorderobject_afvc, has: [AEDATTM, AERECNO, AERUNID, RecordActivity], note: "full CDC — fine"}
      - {table: productionorderobject_afko, has: [AEDATTM, AERECNO, AERUNID, RecordActivity], note: "full CDC — fine"}
      - {table: dbstructureoperationquantitydatevalues_afvv, has: [AEDATTM], missing: [AERUNID, AERECNO, RecordActivity], note: "blocks stg_process_order_operation (AFVV change-union select)"}
      - {table: actualpistartenddatetime_zmanpex_e04_002, has: [AEDATTM], missing: [AERUNID, AERECNO], note: "blocks stg_pi_sheet_execution"}
      - {table: downtime_zpexpm_dwnt, has: [AEDATTM], missing: [AERUNID, AERECNO], note: "blocks stg_downtime_event"}
    warehouse360_dependency: false   # CONFIRMED via gold dependency trace (2026-06-07): none of the 3 feed any of the 7 WH360 governed source objects. They feed only gold_process_order_operations / gold_order_downtime_summary / gold_plant_production_quality_summary (NOT in the 7; NOT in warehouse360_consumption_views_dev.sql). The 7 governed objects depend only on the 4 WM/MM flows + process_order header.
    affects_uat: true   # environment-wide replication gap (same in dev + uat), NOT a dev-only toggle
    handling: "Source-guarded: each flow's full block (view + create_streaming_table + apply_changes) is wrapped in `if bronze_columns_exist(<source>, [CDC cols])` — when the CDC sequencing metadata is absent the flow is not defined, so deterministic SCD1 is never attempted on AEDATTM alone (no fabricated/invented CDC; no AEDATTM-as-sequence). Self-heals once the source is replicated with CDC metadata. The 3 gold consumers degrade to empty via gold._read_or_empty so gold_pipeline (and the 7 governed objects) are not blocked."
    snapshot_redesign:
      afvv: "NOT current-state — AFVV is the operation values sibling of AFVC (same AUFPL+APLZL key); AFVC carries full CDC. AFVV is transactional; snapshot would model the replication gap, not the domain. Correct fix = replicate AFVV with CDC metadata."
      zmanpex_zpexpm: "possibly current-state (PI-sheet exec timing / downtime events). A snapshot/current-state redesign (à la MCHB) is a candidate but requires explicit functional sign-off per source before replacing CDC sequencing — NOT done here."
    status: SOURCE_GUARDED_PENDING_CDC_OR_SNAPSHOT_SIGNOFF

  - id: batch_stock_natural_key_not_strictly_unique
    model: batch_stock (silver/tables/warehouse_fast.py)
    file: silver/tables/warehouse_fast.py
    summary: "batch_stock snapshot natural key (material_code, plant_code, storage_location_code, batch_number) is ~1:1 but not strictly 1:1: 2,016 colliding key groups / 4,039 rows (0.035%) measured live 2026-06-07 via GROUP BY..HAVING."
    evidence: "silver_fast_mapping_validation.sql §E1 (use GROUP BY..HAVING, NOT COUNT(*)-COUNT(DISTINCT) which Spark confounds by dropping NULL-key rows). Bronze MCHB is 1:1 on the RAW key (MANDT,MATNR,WERKS,LGORT,CHARG). Collisions are GENUINE, not a NULL artifact (only 77 NULL batch_number rows, 2 in collisions)."
    cause: "strip_zeros normalises distinct raw MATNR/CHARG (leading-zero / format variants) to the same material_code/batch_number, and the silver key omits MANDT. Pre-existing PR #23 batch_stock design; NOT introduced by the PP/PI gating."
    warehouse360_dependency: "indirect — batch_stock feeds gold_stock_expiry_risk / stock reconciliation; 0.035% colliding rows would slightly double-count stock for those batches."
    impact: low
    affects_uat: true
    follow_up: "Key-design decision (separate change): key on raw identifiers (material_code_raw/batch_number_raw), and/or add MANDT, and/or dedup the snapshot. Re-validate §E1 in UAT business validation."
    status: RECORDED_FOLLOW_UP_NOT_FIXED   # out of scope of the PP/PI unblock PR; PR #23 batch_stock concern

  - id: quality_inspection_qals_field_contract_and_cdc_gap
    model: stg_quality_inspection_lot / quality_inspection_lot (silver/tables/quality.py)
    file: silver/tables/quality.py
    summary: "quality_inspection_lot cannot materialise: replicated inspection_qals lacks CDC sequencing metadata AND the transform's field contract mismatches the replicated schema. Source-guarded off (silver_quality now COMPLETES). NOT a recurring-cost flow (it never ran). NOT a Warehouse360 feeder; no gold reads it."
    # Live DEV information_schema 2026-06-07 (inspection_qals = 266 cols). Two distinct gaps:
    cdc_metadata_gap:
      table: inspection_qals
      present: [AEDATTM]
      missing: [AERUNID, AERECNO, RecordActivity]
      effect: "No deterministic SCD1 sequencing (same gap class as AFVV/zmanpex/zpexpm_dwnt / MCHB). Needs CDC-enabled replication OR an approved snapshot/current-state design (functional sign-off, like MCHB) — NOT decided here."
    # DD03L RECONCILIATION (run 2026-06-07; published_dev.central_services.datadictionaryfields_dd03l +
    # information_schema). Of the transform's QALS references ONLY WERK is a real QALS field — the rest are
    # wrong-name or wrong-table. Authoritative mapping below (CONFIRMED = DD03L + replicated).
    field_contract_gap:
      client: "QALS uses MANDANT (NOT MANDT) — fixed #27. qmih uses MANDT; QAVE uses MANDANT."
      plant: "QALS.WERK (NOT WERKS) — CONFIRMED."
      confirmed_renames_dd03l:   # real QALS fields, present in replicated inspection_qals
        LOTORIGIN: "QALS.HERKUNFT (data element QHERK — lot origin)"
        MENGE: "QALS.LOSMENGE (QLOSMENGE — inspection lot quantity)"
        MEINH: "QALS.MENGENEINH (QLOSMENGEH — lot quantity unit)"
      usage_decision_separate_table:   # QAVE is a CHILD of the lot (1:many), NOT a lot attribute
        grain: "PRUEFLOS + KZART + ZAEHLER — a lot can carry multiple usage decisions (ZAEHLER counter)."
        VCODE: "QAVE.VCODE (QVCODE — plant-specific usage-decision catalog code; NOT accept/reject)."
        VENDAT: "WRONG — usage-decision date is QAVE.VDATUM (legacy silver_qave.csv)."
        accept_reject: "QAVE.VBEWERTUNG (valuation code), NOT VCODE. Value domain (A/R) pending data confirmation."
        modelling: "New silver table quality_inspection_usage_decision; do NOT fold into the lot row 1:1."
      resolved_via_legacy:   # legacy silver_qals.csv resolves what DD03L left as candidates
        inspection_start_date: "QALS.PASTRTERM (planned inspection start, lot grain). ENSTDE was wrong."
        inspection_end_date: "QALS.PAENDTERM (planned inspection end, lot grain). EENDDE was wrong."
        lot_created_date: "QALS.ENSTEHDAT — DISTINCT field (lot creation, not inspection start)."
        order_number: "QALS.AUFNR directly — NOT qmih.AUFNR (lossy 1:many quality-notification object)."
        is_deletion_flagged: "DROP — no KZLOESCH field on QALS. Deletion is system-status-derived (OBJNR/STATxx) if needed."
      cdc: "BOTH inspection_qals AND inspection_qave lack AERUNID/AERECNO (only AEDATTM). Legacy configs use effective_column AEDATTM (current-state/merge) -> corrected SCD1 sequences on AEDATTM (MCHB pattern), NOT struct(_run_id,_record_seq)."
    warehouse360_dependency: false   # quality_inspection_lot feeds no gold module / none of the 7 governed objects
    affects_uat: true
    handling: "Source-guarded: the whole flow is wrapped in `if bronze_columns_exist('inspection_qals', ['AERUNID','AERECNO'])` — absent CDC metadata -> flow not defined -> silver_quality COMPLETES (was failing analysis on MANDT->WERK->...). NO plant gate applied yet and NO field remap done (deliberate — a gate/WERK fix while the contract is broken yields no runtime benefit; advisor-confirmed). NO fabricated fields."
    model_resolved: "Field contract + grain split + AEDATTM ingestion model RESOLVED in docs/quality_qm_functional_model.md (2026-06-07, legacy silver_qals.csv/silver_qave.csv + DD03L). Remaining is implementation + the run-eligibility hold below."
    follow_up: "Implement the corrected model (lot=QALS PASTRTERM/PAENDTERM/AUFNR/WERK..., new quality_inspection_usage_decision from QAVE, AEDATTM-sequenced SCD1, apply_plant_gate(quality) on plant_code). DO NOT flip the source-guard / make the flow run-eligible until the quality plant gate is verified in ('we don't run anything until the plant gate is in'). Then reclassify ENFORCED. Characterisation query: validation/quality_qm_field_contract_check.sql."
    status: MODEL_RESOLVED_SOURCE_GUARDED_PENDING_PLANT_GATE

