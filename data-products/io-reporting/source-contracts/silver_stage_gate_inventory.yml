# Silver stage-gate inventory — every Bronze -> Silver output classified.
# Contract: source-contracts/site_stage_gate_contract.md. Guard: scripts/ci/check_silver_stage_gate_coverage.py.
#
# gating_category:
#   A = plant-gated by DIRECT plant field (WERKS on the main source)
#   B = plant-gated by WAREHOUSE mapping (LGNUM -> WERKS via site_config_warehouse)
#   C = plant-gated by DERIVED order/material/header context
#   D = global reference/config EXEMPTION (no plant dimension)
#   E = BLOCKED — no approved plant derivation
# current_status: ENFORCED | EXEMPT | BLOCKED | NEEDS_MAPPING
#   ENFORCED      = gate helper applied in code (Phase 1 reference set).
#   EXEMPT        = global reference/config; requires exempt_reason.
#   NEEDS_MAPPING = operational, plant/warehouse-derivable, gate NOT yet applied (Phase 2 backlog).
#   BLOCKED       = no approved plant derivation; needs a source/owner decision.
# Phase 1 enforces the runnable WM/MM reference set; all 40 outputs are classified for completeness.

meta:
  canonical_gate_plant: site_config_plant
  canonical_gate_warehouse: site_config_warehouse
  helper: silver/_plant_gate.py
  phase: 1
  enforced_count: 4
  source_guarded_count: 1      # quality_inspection_lot — CDC + field-contract gap (see entry)
  exempt_count: 16
  needs_mapping_count: 19
  blocked_count: 0
  # NOTE: this branch is off main; the unmerged process-order PR also edits these counts + adds 3 more
  # SOURCE_GUARDED + 1 ENFORCED. The meta block will need a trivial merge-resolution when both land.

