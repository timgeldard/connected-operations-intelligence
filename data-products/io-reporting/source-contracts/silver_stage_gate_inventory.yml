  - table_name: quality_inspection_lot
    file: silver/tables/quality.py
    source_tables: [inspection_qals, qualitymessage_qmih]
    gating_category: DIRECT_PLANT   # plant is WERK on inspection_qals (NOT WERKS) — direct, once the contract is reconciled
    gate_field: plant_code
    gate_join_path: "inspection_qals.WERK (direct)"
    gate_config_table: site_config_plant
    product_area: quality
    current_status: SOURCE_GUARDED
    owner_action_required: >-
      Source-guarded off (inspection_qals lacks AERUNID/AERECNO CDC metadata → no deterministic SCD1; only
      AEDATTM present). Does NOT materialise, so it is NOT a recurring-cost flow. A plant gate is NOT yet
      applied (deliberate): the transform's field contract mismatches the replicated inspection_qals, so a
      gate/WERK fix in isolation gives no runtime benefit. FULL QM RECONCILIATION required before enabling:
      (1) CDC metadata on inspection_qals (AERUNID/AERECNO) OR an approved snapshot/current-state design;
      (2) field contract — plant WERK (not WERKS); LOTORIGIN/MENGE/MEINH appear renamed (HERKUNFT/LOSMENGE/
      MENGENEINH — confirm via DD03L); VCODE/VENDAT (usage decision) are NOT on QALS (QAVE); ENSTDE/EENDDE/
      KZLOESCH absent. MANDANT/client already fixed (#27). See sap_unresolved_sources.yml
      (quality_inspection_qals_field_contract_and_cdc_gap) + validation/quality_qm_field_contract_check.sql.
      Then add apply_plant_gate(quality) and reclassify ENFORCED. NOT a Warehouse360 feeder; no gold reads it.
    validation_query_reference: validation/quality_qm_field_contract_check.sql

