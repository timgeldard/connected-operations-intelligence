packages:
  - 'apps/*'
  - 'packages/*'
  - 'domain-integrations/*'

allowBuilds:
  esbuild: true

# Catalog pins the React 19 baseline; combined with `overrides` below (pnpm 11 reads
# overrides here, not from package.json's pnpm.overrides) this guarantees a single
# React resolution across the workspace.
catalog:
  react: ^19.0.0
  react-dom: ^19.0.0
  '@types/react': ^19.0.0
  '@types/react-dom': ^19.0.0

overrides:
  react: ^19.0.0
  react-dom: ^19.0.0
  '@types/react': ^19.0.0
  '@types/react-dom': ^19.0.0
