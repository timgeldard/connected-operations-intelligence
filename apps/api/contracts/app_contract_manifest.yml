    fields:
      - name: plant_id
        type: string
        required: true
        description: SAP plant ID
      - name: order_id
        type: string
        required: true
        description: Process order identifier
      - name: material_id
        type: string
        required: false
        description: Material code being staged
      - name: order_qty
        type: decimal
        required: false
        description: Process order total quantity
      - name: uom
        type: string
        required: false
        description: Unit of measure
      - name: material_name
