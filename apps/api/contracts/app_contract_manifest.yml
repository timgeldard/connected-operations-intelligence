  - id: warehouse360.stock_exceptions
    version: 0.2.0
    domain: warehouse
    owner: warehouse-operations
    lifecycle: draft
    description: >
      Warehouse stock exceptions including expiry, shelf life breach, and status blocks.
      Candidate contract pending DEV profiling of grain, primary key uniqueness,
      plant_id nullability, data types, and freshness.
    source_view: vw_consumption_warehouse360_stock_exceptions
    grain: one row per plant_id, material_id, batch_id, and exception type
    primary_key:
      - plant_id
      - material_id
      - batch_id
      - exception_type
    freshness:
      expected_minutes: 30
      warning_minutes: 60
      critical_minutes: 120
    access_policy:
      row_level_key: plant_id
      entitlement_source: published.central_services.user_plant_access
    fields:
      - name: plant_id
        type: string
        required: true
        description: SAP plant ID
      - name: material_id
        type: string
        required: true
        description: Material code
      - name: batch_id
        type: string
        required: true
        description: Batch number
      - name: exception_type
        type: string
        required: true
        description: Computed exception bucket (EXPIRED/LT_7_DAYS/DAYS_7_30/DAYS_30_90)
