  - id: wm_operations.component_variance
    version: 0.2.0
    domain: warehouse
    owner: warehouse-operations
    lifecycle: draft
    description: >
      Order + material grain material variance for the Yield & Loss waterfall.
      One row per plant_id, order_id, material_id (aggregated from reservation_requirement).
      Silver goods_movement carries no reservation references (MSEG has no RSNUM/RSPOS in
      the replication schema), so reservation grain would double-count issued_qty for orders
      with multiple RESB rows for the same material. Grain changed from reservation-item
      to order+material in v0.2.0.
      variance_qty = issued_qty - required_qty (positive = over-issue / loss; negative = under-issue).
      est_loss_value = over-issued qty × standard_price / price_unit (null when no price data).
      Quantities stay in each row's own base_uom — no cross-material aggregation in gold.
      Source: gold_wm_order_component_variance (reservation_requirement + goods_movement + material_valuation).
    source_view: vw_consumption_wm_operations_component_variance
    grain: one row per plant_id, order_id, and material_id
    primary_key:
      - plant_id
      - order_id
      - material_id
    freshness:
      expected_minutes: 60
      warning_minutes: 120
      critical_minutes: 240
    access_policy:
      row_level_key: plant_id
      entitlement_source: published.central_services.user_plant_access
    fields:
      - name: plant_id
        type: string
        required: true
      - name: order_id
        type: string
        required: true
      - name: material_id
        type: string
        required: true
      - name: material_name
        type: string
        required: false
      - name: uom
        type: string
        required: false
      - name: movement_type_code
        type: string
        required: false
      - name: required_qty
        type: double
        required: true
      - name: withdrawn_qty
        type: double
        required: false
      - name: issued_qty
        type: double
        required: false
      - name: variance_qty
        type: double
        required: false
      - name: variance_pct
        type: double
        required: false
      - name: est_loss_value
        type: double
        required: false
      - name: standard_price
        type: double
        required: false
      - name: is_final_issue
        type: boolean
        required: false
