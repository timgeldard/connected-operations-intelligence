# Databricks Apps configuration for ConnectIO V2
# Docs: https://docs.databricks.com/en/dev-tools/databricks-apps/index.html
#
# Deploy from the repo root:
#   1. Prepare artifact: npm run prepare:databricks
#   2. Bundle deploy:    databricks bundle deploy --target uat
#
# Secret scope "connectio-v2" must exist in the target workspace before deployment.
# See docs/deployment/databricks-apps.md for full setup instructions.
#
# IMPORTANT: valueFrom must be a plain "scope/key" string.
# Nested YAML dicts (valueFrom: {secretScope: ..., secretKey: ...}) are NOT supported
# and cause "error reading app.yaml file" at startup.

command:
  - uvicorn
  - main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"
  - --workers
  - "2"

# OAuth scopes included in the forwarded user token (x-forwarded-access-token).
# "sql" is required for the token to be accepted by the SQL statement API.
# The resources block grants the service principal warehouse access but does NOT
# add sql to the user's forwarded token — user_api_scopes does that.
user_api_scopes:
  - sql

resources:
  - name: connectio-warehouse
    description: SQL warehouse for Databricks native reads
    sql_warehouse:
      id: e76480b94bea6ed5
      permission: CAN_USE

env:
  # V1 backend URLs — format: valueFrom: scope/key
  - name: V1_TRACE_API_BASE_URL
    valueFrom: connectio-v2/v1-trace-api-base-url

  - name: V1_POH_API_BASE_URL
    valueFrom: connectio-v2/v1-poh-api-base-url

  - name: V1_CQ_API_BASE_URL
    valueFrom: connectio-v2/v1-cq-api-base-url

  # Backend adapter mode: "legacy-api" (proxy to V1) or "databricks-api" (native reads).
  # Currently: databricks-api — native Databricks reads active. Warehouse360 is fully
  # governed (no V1 WH360 proxy remains; V1_WH360_API_BASE_URL removed).
  - name: BACKEND_ADAPTER_MODE
    value: databricks-api

  # Databricks connection — non-secret config values set as literals.
  # The workspace host and warehouse ID are not credentials; no need for secret scope.
  # Note: DAB ${var.*} substitution applies to databricks.yml only, not app.yaml.
  # Per-environment values live in the targets section of databricks.yml.
  - name: DATABRICKS_HOST
    value: https://adb-604667594731808.8.azuredatabricks.net

  - name: SQL_WAREHOUSE_ID
    value: e76480b94bea6ed5

  # Domain catalog/schema — non-secret config set as literals.
  # Per-environment values live in the targets section of databricks.yml.
  - name: POH_CATALOG
    value: connected_plant_uat

  - name: CQ_CATALOG
    value: connected_plant_uat

  # TRACE_CATALOG / TRACE_SCHEMA — required for Trace and EnvMon databricks-api routes.
  # Activated q.txt (2026-05-18): POST /api/trace2/trace-graph + GET /api/envmon/* routes.
  - name: TRACE_CATALOG
    value: connected_plant_uat

  - name: TRACE_SCHEMA
    value: gold

  # TRACE_GOVERNED_SCHEMA — required for governed trace2 objects in the io-reporting schema.
  # Two objects have migrated from TRACE_SCHEMA (gold) to the governed io-reporting schema:
  #   • gold_trace_anchor_secured  (RLS-enforced anchor MV — batch-search primary source)
  #   • gold_batch_lineage          (T2 governed MV — batch-search po_match + trace-graph)
  # All other trace2 objects (gold_material, gold_plant, gold_batch_stock_v, …) remain on
  # TRACE_SCHEMA (gold) — no governed equivalents exist for those yet.
  # MUST be set explicitly — object_resolver.py defaults it to "gold_io_reporting" but
  # app.yaml requires per-environment literals (DAB ${var.*} substitution does not apply here).
  # CAVEAT: end-user reads of governed gold_batch_lineage require the `traceability-readers`
  # UC group (not yet provisioned in UAT as of 2026-06-12). Owner/admin identities work today.
  - name: TRACE_GOVERNED_SCHEMA
    value: gold_io_reporting

  # SPC catalog/schema — required for GET /api/spc/* native routes.
  # SPC Phase 2 governed wiring: point the adapter at the governed gold_io_reporting schema
  # so it reads the RLS-filtered spc_quality_metric_subgroup_mv serving view (which is a
  # SELECT * pass-through of gold_spc_quality_metric_subgroup_secured). SPC_CATALOG falls back
  # to TRACE_CATALOG (object_resolver.py) — set SPC_CATALOG explicitly for clarity.
  # SPC_SCHEMA MUST be set explicitly — object_resolver.py defaults it to "gold" (legacy schema).
  - name: SPC_CATALOG
    value: connected_plant_uat

  - name: SPC_SCHEMA
    value: gold_io_reporting

  # WH360 catalog/schema — required for GET /api/warehouse360/* native routes.
  # GOVERNED WIRING (Gate B / validation_fixture, UAT): point the app at the governed serving schema so it
  # reads the RLS-filtered vw_consumption_warehouse360_* views instead of legacy connected_plant_uat.wh360.*.
  # WH360_SCHEMA MUST be set explicitly — object_resolver.py defaults it to "wh360" (legacy).
  - name: WH360_CATALOG
    value: connected_plant_uat

  - name: WH360_SCHEMA
    value: gold_io_reporting

  # warehouse360_databricks_adapter.py REQUIRES this to be 'legacy_wh360' or 'governed_contracts' (raises if
  # unset). governed_contracts → each route resolves to the vw_consumption_warehouse360_* governed views,
  # RLS-filtered per end-user via current_user() (identity passed through as x-forwarded-access-token).
  - name: WAREHOUSE360_SOURCE_MODE
    value: governed_contracts

  # Auth diagnostics — DISABLED. OAuth headers confirmed 2026-05-17.
  # Re-enable by adding: - name: ENABLE_AUTH_DIAGNOSTICS / value: "true"
  # GET /api/diagnostics/auth-headers returns token_present/user_header_present (never raw token).

  # Contract manifest path — the deployed app only contains apps/api/, so the resolver's
  # repo-root walk-up finds no .git marker and falls back to a wrong absolute path.
  # This env var points it at the copy bundled alongside the app source.
  - name: APP_MANIFEST_PATH
    value: /app/python/source_code/contracts/app_contract_manifest.yml

  # Python runtime
  - name: PYTHONUNBUFFERED
    value: "1"
