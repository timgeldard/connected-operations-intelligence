bundle:
  name: connected-plant

include:
  - resources/*.yml

variables:
  catalog:
    default: connected_plant_dev
  schema:
    default: silver_dev
  gold_schema:
    default: gold_dev
  source_catalog:
    default: connected_plant_dev
  source_schema:
    default: sap_sample
  published_catalog:
    default: published_uat
  published_schema:
    default: central_services
  notification_email:
    description: Required notification distribution list for pipeline and job failures.

targets:
  dev_uat_source:
    default: true
    mode: development
    workspace:
      profile: DEFAULT
    variables:
      catalog: connected_plant_dev
      schema: silver_dev
      gold_schema: gold_dev
      source_catalog: connected_plant_uat
      source_schema: sap
      published_catalog: published_uat
      published_schema: central_services
    resources:
      pipelines:
        silver_fast_pipeline:
          development: true
        silver_slow_pipeline:
          development: true
        silver_quality_pipeline:
          development: true
        gold_pipeline:
          development: true

  dev_sample:
    mode: development
    workspace:
      profile: DEFAULT
    variables:
      catalog: connected_plant_dev
      schema: silver_dev
      gold_schema: gold_dev
      source_catalog: connected_plant_dev
      source_schema: sap_sample
      published_catalog: published_uat
      published_schema: central_services
    resources:
      pipelines:
        silver_fast_pipeline:
          development: true
        silver_slow_pipeline:
          development: true
        silver_quality_pipeline:
          development: true
        gold_pipeline:
          development: true

  uat:
    mode: production
    workspace:
      profile: DEFAULT
    variables:
      catalog: connected_plant_uat
      schema: silver
      gold_schema: gold
      source_catalog: connected_plant_uat
      source_schema: sap
      published_catalog: published_uat
      published_schema: central_services

  prod:
    mode: production
    workspace:
      profile: DEFAULT
    variables:
      catalog: connected_plant_prod
      schema: silver
      gold_schema: gold
      source_catalog: connected_plant_prod
      source_schema: sap
      published_catalog: published_prod
      published_schema: central_services
