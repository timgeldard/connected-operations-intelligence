resources:
  pipelines:
    silver_slow_pipeline:
      name: "[${bundle.target}] Connected Plant — Silver Reference"
      catalog: ${var.catalog}
      schema: ${var.schema}

      serverless: true
      continuous: false
      photon: true
      channel: CURRENT
      development: false

      tags:
        owner: connected-plant-team
        cost-center: connected-plant
        project: ops-reporting

      configuration:
        source_catalog: ${var.source_catalog}
        source_schema: ${var.source_schema}
        published_catalog: ${var.published_catalog}
        published_schema: ${var.published_schema}
        # Governed storage-type→role config table (admin-maintained; seeded from
        # resources/config/storage_type_role_mapping.csv). storage_type_role_mapping reads it when
        # present, else falls back to the embedded bootstrap seed.
        storage_role_config_table: ${var.catalog}.${var.schema}.storage_type_role_mapping_config
        pipelines.defaultTableProperties.custom_tags.owner: connected-plant-team
        pipelines.defaultTableProperties.custom_tags.cost-center: connected-plant
        pipelines.defaultTableProperties.custom_tags.project: ops-reporting

      libraries:
        - file:
            path: ../silver/dlt_silver_slow.py

      notifications:
        - email_recipients:
            - ${var.notification_email}
          alerts:
            - on-update-failure
            - on-update-fatal-failure
            - on-flow-failure

      permissions:
        - level: CAN_VIEW
          group_name: users
