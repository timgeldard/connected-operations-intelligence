resources:
  pipelines:
    silver_fast_pipeline:
      name: "[${bundle.target}] Connected Plant — Silver Fast"
      catalog: ${var.catalog}
      schema: ${var.schema}

      serverless: true
      continuous: true
      photon: true
      channel: CURRENT
      development: false

      configuration:
        source_catalog: ${var.source_catalog}
        source_schema: ${var.source_schema}

      libraries:
        - file:
            path: ../silver/dlt_silver_fast.py

      # Daily restart window — low-traffic period (UTC)
      restart_window:
        start_hour: 2
        time_zone_id: UTC

      notifications:
        - email_recipients:
            - ${var.notification_email}
          alerts:
            - on-update-failure
            - on-update-fatal-failure
            - on-flow-failure

      permissions:
        - level: CAN_VIEW
          group_name: users
