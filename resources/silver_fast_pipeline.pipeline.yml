resources:
  pipelines:
    silver_fast_pipeline:
      name: "[${bundle.target}] Connected Plant — Silver Fast"
      catalog: ${var.catalog}
      schema: ${var.schema}

      serverless: true
      continuous: true
      photon: true
      channel: CURRENT
      development: false

      tags:
        owner: connected-plant-team
        cost-center: connected-plant
        project: ops-reporting

      configuration:
        source_catalog: ${var.source_catalog}
        source_schema: ${var.source_schema}
        # process_order reads the SAP classification tables (INOB/AUSP/CAWNT) for process-line
        # enrichment; those live in the published/central_services source, so the fast pipeline
        # needs the published source configured (same as the slow pipeline).
        published_catalog: ${var.published_catalog}
        published_schema: ${var.published_schema}
        pipelines.defaultTableProperties.custom_tags.owner: connected-plant-team
        pipelines.defaultTableProperties.custom_tags.cost-center: connected-plant
        pipelines.defaultTableProperties.custom_tags.project: ops-reporting

      libraries:
        - file:
            path: ../silver/dlt_silver_fast.py

      # Daily restart window — low-traffic period (UTC)
      restart_window:
        start_hour: 2
        time_zone_id: UTC

      notifications:
        - email_recipients:
            - ${var.notification_email}
          alerts:
            - on-update-failure
            - on-update-fatal-failure
            - on-flow-failure

      permissions:
        - level: CAN_VIEW
          group_name: users
